services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      - VIZ_EXAMPLES_DIR=/app/data/examples
    ports:
      - "8000:8000"

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
      - ./data/examples:/usr/share/nginx/videos
    depends_on:
      - backend
