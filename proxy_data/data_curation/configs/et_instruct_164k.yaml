# ET-Instruct-164K 筛选配置

source:
  name: et_instruct_164k
  remote_path: /m2v_intern/xuboshen/zgw/data/ET-Instruct-164K
  json_files:
    - et_instruct_164k_vid.json   # 视频相关样本（优先处理）
    - et_instruct_164k_txt.json   # 纯文本样本（可能跳过）
  video_dir: videos/              # 各 domain 的 tar.gz 包

# 视频域及其 tar.gz
domains:
  - activitynet
  - coin
  - didemo
  - ego4d_naq
  - ego_timeqa
  - hacs
  - how_to_caption
  - how_to_step
  - mr_hisum
  - queryd
  - tacos
  - vitt

# 文本筛选阈值（基于分布分析确定）
text_filter:
  min_duration_sec: 60
  max_duration_sec: 240
  min_events: 5           # ≥5 个事件，保证 L1 聚合 + L3 分解空间
  min_text_length: 50     # GPT 回复最短字符数

# 领域均衡
domain_balance:
  strategy: proportional_cap  # proportional_cap | equal | weighted
  max_per_domain: 2000        # 单个 domain 上限
  min_per_domain: 100         # 单个 domain 下限（不足则全部保留）

# ── 两阶段 LLM 筛选 ──

# Stage A: L2 粒度粗筛
# 目的: 快速判断 ET 的 tgt 事件粒度是否适合作为 L2
stage_a:
  model: pa/gmn-2.5-pr
  api_base: https://api.novita.ai/v3/openai
  workers: 8
  sample_n: 200                  # 抽样先跑 200 条看分布
  # 硬规则阈值（覆盖 LLM decision）
  keep_rules:
    granularity_label: mostly_L2_like
    l2_fit_score_min: 4
    granularity_issue: good
    mixed_ratio_estimate: low
  reject_rules:
    granularity_labels:           # 任一命中即 reject
      - mostly_L1_like
      - mostly_L3_like
    l2_fit_score_max: 2

# Stage B: 层次潜力精筛
# 目的: 对 Stage A keep 的样本评估 L1/L3 扩展潜力和时序结构
stage_b:
  model: pa/gmn-2.5-pr
  api_base: https://api.novita.ai/v3/openai
  workers: 8
  keep_rules:
    overall_score_min: 4
    all_dimensions_min: 3        # l1_potential, l3_potential, temporal_structure 均 >= 3
  reject_rules:
    overall_score_max: 2
    any_dimension_max: 1         # 任一维度 <= 1 即 reject

# 输出
output:
  results_dir: results/et_instruct_164k
  review_sample_size: 50
