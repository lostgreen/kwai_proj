<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rollout Insight Studio</title>
<style>
:root{
  --bg:#f8fafc; --panel:rgba(255,255,255,0.92); --border:rgba(100,116,139,0.18);
  --text:#1e293b; --muted:#64748b; --ok:#059669; --warn:#d97706;
  --danger:#e11d48; --blue:#2563eb; --violet:#7c3aed; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:radial-gradient(1200px 500px at 8% -10%,rgba(37,99,235,.08),transparent 70%),
    radial-gradient(900px 450px at 92% 0%,rgba(16,185,129,.06),transparent 65%),var(--bg);
  min-height:100vh}
.page{display:none;padding:20px;max-width:1440px;margin:0 auto}.page.active{display:block}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.06)}
h1{font-size:24px;font-weight:700}h2{font-size:17px;font-weight:700}
h3{font-size:13px;font-weight:600;color:#374151}
.muted{color:var(--muted);font-size:12px}
.badge{font-size:11px;display:inline-block;border-radius:999px;padding:3px 9px;
  border:1px solid rgba(100,116,139,.25);color:#334155;white-space:nowrap}
.chip{font-size:11px;display:inline-block;border-radius:6px;padding:2px 7px;
  background:rgba(100,116,139,.1);color:#475569}
.input,select{border-radius:10px;padding:9px 12px;font-size:13px;
  border:1px solid rgba(100,116,139,.25);background:rgba(255,255,255,.8);color:var(--text)}
.btn{border:none;font-weight:600;cursor:pointer;padding:9px 18px;font-size:13px;
  border-radius:10px;color:#08131f;background:linear-gradient(135deg,#7dd3fc,#34d399)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(148,163,184,.3);
  border-top-color:var(--ok);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Overview ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 0 14px}
.stat{padding:12px 14px}.stat .k{color:var(--muted);font-size:11px;margin-bottom:5px}
.stat .v{font-size:22px;font-weight:700}
.chart-section{padding:16px 18px;margin-bottom:12px}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;user-select:none;transition:opacity .2s}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-svg{display:block;background:rgba(241,245,249,.8);border:1px solid rgba(100,116,139,.15);border-radius:10px}
.metric-tab{font-size:11px;padding:4px 10px;border-radius:8px;cursor:pointer;border:1px solid rgba(100,116,139,.2);
  background:rgba(255,255,255,.6);color:#475569;transition:all .15s;white-space:nowrap}
.metric-tab:hover{border-color:var(--blue);color:var(--blue)}
.metric-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.smooth-control{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.smooth-control input[type=range]{accent-color:#34d399;width:130px;cursor:pointer}
.step-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px}
.step-card{padding:14px 16px;cursor:pointer;display:grid;gap:8px;transition:border-color .2s}
.step-card:hover{border-color:rgba(96,165,250,.5)}
.step-minibar{width:100%;height:5px;border-radius:999px;background:rgba(100,116,139,.12);overflow:hidden;display:flex;gap:1px}
/* ── Detail layout ── */
.detail-layout{display:grid;grid-template-columns:290px minmax(0,1fr);gap:12px}
.detail-header{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:12px;flex-wrap:wrap}
.back-btn{background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.2);
  color:var(--text);border-radius:10px;padding:6px 14px;font-size:13px;cursor:pointer}
.back-btn:hover{background:rgba(100,116,139,.15)}
.group-sidebar{padding:14px;display:grid;gap:8px;align-content:start;max-height:calc(100vh - 120px);overflow-y:auto}
.group-list{overflow-y:auto;border:1px solid rgba(100,116,139,.15);border-radius:10px;max-height:560px}
.group-row{padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(100,116,139,.1);display:grid;gap:3px}
.group-row:hover{background:rgba(37,99,235,.06)}.group-row.active{background:rgba(5,150,105,.08)}
.group-main{display:grid;gap:12px;align-content:start;overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 120px);min-width:0}
/* ── Frame + timeline sync ── */
.sync-outer{overflow-x:auto;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.frame-item{flex-shrink:0;display:grid;gap:3px;width:100px;cursor:pointer}
.frame-img{width:100px;height:60px;border-radius:7px;border:2px solid rgba(100,116,139,.2);
  background:rgba(241,245,249,.6);display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--muted);position:relative;overflow:hidden;transition:border-color .2s}
.frame-img:hover{border-color:var(--blue);box-shadow:0 0 8px rgba(96,165,250,.3)}
.frame-img img{width:100%;height:100%;object-fit:cover;border-radius:5px}
.frame-img.mod{border-color:rgba(245,158,11,.65);background:rgba(245,158,11,.08)}
/* ── Lazy-load frame skeleton ── */
.frame-skeleton-item{width:100px;height:60px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(90deg,rgba(100,116,139,.1) 25%,rgba(100,116,139,.2) 50%,rgba(100,116,139,.1) 75%);
  background-size:200% 100%;animation:frame-shimmer 1.4s ease-in-out infinite}
@keyframes frame-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.frames-lazy-bar{font-size:11px;color:var(--muted);padding:6px 2px;display:flex;align-items:center;gap:6px}
.frame-mod-badge{position:absolute;top:2px;right:2px;font-size:7px;padding:1px 3px;
  background:rgba(245,158,11,.85);border-radius:3px;color:#08131f;font-weight:700}
.frame-clip-badge{position:absolute;bottom:2px;left:2px;font-size:7px;padding:1px 4px;
  border-radius:3px;font-weight:700;color:#fff}
.frame-label{font-size:9px;color:var(--muted);text-align:center;line-height:1}
/* ── Frame zoom modal ── */
.frame-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.frame-modal-overlay.active{display:flex}
.frame-modal-overlay img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,.5)}
.sync-slider-row{padding:4px 0 2px;display:flex;align-items:center;gap:8px}
.sync-slider{flex:1;accent-color:#34d399;cursor:pointer}
.sync-shell{width:100%;max-width:100%;overflow-x:auto;overflow-y:hidden;padding-bottom:4px;cursor:grab}
.sync-shell.dragging{cursor:grabbing;user-select:none}
.sync-inner{display:inline-block;min-width:max-content}
.scroll-control{
  display:flex;align-items:center;gap:10px;margin-top:10px;margin-bottom:4px;
  padding:8px 10px;border-radius:12px;background:rgba(241,245,249,.72);border:1px solid rgba(100,116,139,.12)
}
.scroll-control .meta{font-size:11px;color:var(--muted);white-space:nowrap}
.scroll-slider{flex:1;accent-color:#34d399;cursor:pointer}
.timeline-frame-row{display:flex;gap:6px;margin-bottom:12px}
.timeline-frame-item{width:88px;flex:0 0 auto;display:grid;gap:5px;cursor:pointer}
.timeline-frame-thumb{
  width:88px;height:56px;border-radius:12px;border:2px solid rgba(100,116,139,.16);
  background:rgba(241,245,249,.6);display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:10px;overflow:hidden;position:relative
}
.timeline-frame-thumb:hover{border-color:var(--blue);box-shadow:0 0 8px rgba(96,165,250,.24)}
.timeline-frame-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.timeline-frame-label{text-align:center;font-size:10px;color:var(--muted);font-family:"JetBrains Mono","Fira Code",monospace}
.tl-label-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);white-space:nowrap}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-tick{position:absolute;top:0;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.tl-lane{position:relative;height:18px;border-radius:999px;background:rgba(100,116,139,.1);overflow:hidden}
.seg-blk{position:absolute;top:2px;bottom:2px;border-radius:999px;opacity:.9}
/* ── Modification band ── */
.mod-band{margin-top:8px;padding:7px 12px;border-radius:8px;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
  display:flex;align-items:center;gap:10px;font-size:11px;flex-wrap:wrap}
.mod-timeline{flex:1;min-width:120px;height:8px;background:rgba(100,116,139,.1);border-radius:999px;position:relative}
.mod-timeline-seg{position:absolute;top:0;bottom:0;background:rgba(245,158,11,.6);border-radius:999px}
/* ── Sort ── */
.sort-rollout-panel{padding:10px 0;border-bottom:1px solid rgba(100,116,139,.08)}
.sort-rollout-panel:last-child{border-bottom:none}
.sort-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:6px}
.sort-clip{border-radius:10px;border:2px solid transparent;background:rgba(241,245,249,.6);overflow:hidden}
.sort-clip-img{width:100%;aspect-ratio:16/9;background:rgba(241,245,249,.5);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);position:relative;overflow:hidden}
.sort-clip-img img{width:100%;height:100%;object-fit:cover}
.sort-clip-meta{padding:3px 5px;display:flex;justify-content:space-between;align-items:center;font-size:10px}
.sort-clip-delta{font-size:9px;padding:1px 4px;border-radius:4px;font-weight:600}
.s-ok{border-color:rgba(52,211,153,.6)}.s-ok .sort-clip-delta{background:rgba(52,211,153,.2);color:#34d399}
.s-d1{border-color:rgba(245,158,11,.6)}.s-d1 .sort-clip-delta{background:rgba(245,158,11,.2);color:#f59e0b}
.s-d2{border-color:rgba(251,113,133,.55)}.s-d2 .sort-clip-delta{background:rgba(251,113,133,.2);color:#fb7185}
/* ── Choice ── */
.choice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:8px}
.choice-card{border-radius:10px;border:2px solid rgba(100,116,139,.18);background:rgba(241,245,249,.6);overflow:hidden}
.choice-card.c-both{border-color:rgba(167,139,250,.8)}
.choice-card.c-gt{border-color:rgba(52,211,153,.7)}
.choice-card.c-pred{border-color:rgba(96,165,250,.7)}
.choice-thumb{width:100%;aspect-ratio:16/9;background:rgba(241,245,249,.5);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);overflow:hidden;position:relative}
.choice-thumb img{width:100%;height:100%;object-fit:cover}
.choice-foot{padding:5px 8px;display:flex;justify-content:space-between;align-items:center;font-size:11px;gap:4px}
.choice-text-grid{display:grid;gap:7px}
.choice-text-card{border-radius:10px;border:2px solid rgba(100,116,139,.18);
  background:rgba(241,245,249,.6);padding:10px 12px;display:grid;gap:4px}
.choice-text-card.c-gt{border-color:rgba(52,211,153,.7)}
.choice-text-card.c-pred{border-color:rgba(96,165,250,.7)}
/* ── Misc ── */
.mono{font-family:"JetBrains Mono","Fira Code",monospace;font-size:11px;line-height:1.45;
  white-space:pre-wrap;word-break:break-word;padding:8px 10px;
  background:rgba(241,245,249,.7);border-radius:8px;border:1px solid rgba(100,116,139,.15);
  max-height:300px;overflow-y:auto;color:#475569;margin-top:6px}
::-webkit-scrollbar{width:4px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(100,116,139,.25);border-radius:999px}
::-webkit-scrollbar-track{background:transparent}
input[type=range]{-webkit-appearance:auto;appearance:auto;cursor:pointer;height:20px}
</style>
</head>
<body>

<!-- ═══════ PAGE 1: OVERVIEW ═══════ -->
<div id="pg-overview" class="page active">
  <div class="card" style="padding:16px 18px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px">
      <div>
        <h1>Rollout Insight Studio</h1>
        <p class="muted" style="margin-top:4px">多任务 RL 训练 rollout 可视化分析平台</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input id="rolloutDir" class="input" style="width:300px" placeholder="rollouts 目录路径"/>
        <input id="logFile" class="input" style="width:220px" placeholder="experiment_log.jsonl（可选）"/>
        <button class="btn" id="loadBtn" onclick="doLoad()">加载数据</button>
      </div>
    </div>
    <p id="statusMsg" style="font-size:12px;color:var(--blue);margin-top:8px"> </p>
  </div>

  <div class="stats-row">
    <article class="stat card"><div class="k">Groups</div><div class="v" style="color:var(--blue)" id="statGroups">—</div></article>
    <article class="stat card"><div class="k">Samples</div><div class="v" id="statSamples">—</div></article>
    <article class="stat card"><div class="k">Steps</div><div class="v" id="statSteps">—</div></article>
    <article class="stat card"><div class="k">最新奖励</div><div class="v" style="color:var(--ok)" id="statRew">—</div></article>
    <article class="stat card"><div class="k">seg 占比</div><div class="v" style="color:var(--warn)" id="statSeg">—</div></article>
  </div>

  <div class="card chart-section" style="margin-bottom:12px">
    <div class="chart-header">
      <span style="font-size:13px;font-weight:600;color:#374151">📈 奖励曲线</span>
      <div class="smooth-control">
        <span>Smooth</span>
        <input type="range" id="smoothSlider" min="0" max="98" value="60" oninput="onSmooth(this.value)"/>
        <span id="smoothVal" style="min-width:28px;text-align:right">0.60</span>
      </div>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
    <svg id="rewardChart" class="chart-svg" viewBox="0 0 820 180" style="width:100%;height:180px"></svg>
  </div>

  <!-- ═══════ TRAINING METRICS CHARTS ═══════ -->
  <div class="card chart-section" id="trainingMetricsSection" style="margin-bottom:12px;display:none">
    <div class="chart-header">
      <span style="font-size:13px;font-weight:600;color:#374151">📊 训练指标</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap" id="metricTabs"></div>
    </div>
    <div id="metricTooltip" style="font-size:12px;color:var(--muted);padding:4px 0 8px;line-height:1.5;min-height:18px"></div>
    <svg id="metricsChart" class="chart-svg" viewBox="0 0 820 200" style="width:100%;height:200px"></svg>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2 style="color:#374151;font-size:14px;font-weight:600">按 Batch 浏览 <span class="muted">— 点击进入详情</span></h2>
    <span id="stepCountLabel" class="muted"></span>
  </div>
  <div class="step-grid" id="stepGrid">
    <div class="card" style="padding:20px;text-align:center;color:var(--muted);grid-column:1/-1">
      加载数据后将显示批次列表
    </div>
  </div>
</div>

<!-- ═══════ PAGE 2: DETAIL ═══════ -->
<div id="pg-detail" class="page">
  <div class="detail-header card">
    <button class="back-btn" onclick="showPage('pg-overview')">← 返回总览</button>
    <h2 style="margin:0" id="detailTitle">Batch —</h2>
    <div id="detailBadges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    <div id="detailLoader" style="display:none"><span class="spin"></span> 加载中…</div>
  </div>
  <div class="detail-layout">
    <aside class="card group-sidebar">
      <h3>Groups <span class="muted" id="groupCount"></span></h3>
      <select class="input" style="width:100%" id="sidebarTask" onchange="filterGroups()">
        <option value="all">全部任务</option>
        <option>temporal_seg</option><option>add</option>
        <option>delete</option><option>replace</option><option>sort</option>
        <option>aot_v2t</option><option>aot_t2v</option>
      </select>
      <div class="group-list" id="groupList">
        <div style="padding:14px;text-align:center;color:var(--muted);font-size:12px">暂无数据</div>
      </div>
    </aside>
    <div class="group-main" id="groupMain">
      <div class="card" style="padding:40px;text-align:center;color:var(--muted)">← 从左侧选择一条样本</div>
    </div>
  </div>
</div>
<!-- Frame zoom modal -->
<div class="frame-modal-overlay" id="frameModal" onclick="this.classList.remove('active')">
  <img id="frameModalImg" src="" alt="zoomed frame"/>
</div>

<script>
/* ═══════════════ CONSTANTS ═══════════════ */
const FW=104, FG=4, STRIDE=FW+FG, LABEL_W=68;
const SEG_FW=88, SEG_GAP=6, SEG_STRIDE=SEG_FW+SEG_GAP;
const TC={temporal_seg:'#fb7185',add:'#60a5fa',delete:'#34d399',replace:'#f59e0b',sort:'#a78bfa',aot_v2t:'#0f766e',aot_t2v:'#be185d'};
const CLIP_COLORS=['#60a5fa','#34d399','#f59e0b','#a78bfa','#fb7185','#38bdf8','#e879f9','#fbbf24'];
const taskColor=t=>TC[t.replace(/_video|_text/,'')]||'#94a3b8';
const rewColor=r=>r>=.7?'#34d399':r>=.5?'#f59e0b':'#fb7185';

/* ═══════════════ STATE ═══════════════ */
let curSummary=null, curSteps=[], curStepGroups=[], curStep=null, curStepKey=null, curStepLabel='';
let chartData={}, hiddenCurves=new Set();
/* uid -> {frame_strip, clip_boundaries, timeline_frame_strip, timeline_max_t} — populated after lazy load */
const _framesCache={};
/* Base path prefix: handles reverse-proxy deployments where page is served at /proxy/PORT/.
   e.g. http://localhost:8890/  → BASE=''
        https://proxy.kaimm.com/proxy/8890/  → BASE='/proxy/8890' */
const BASE = window.location.pathname.replace(/\/[^/]*$/, '');

/* ═══════════════ API ═══════════════ */
async function requestJson(url){
  const res=await fetch(url);
  const text=await res.text();
  let payload=null;
  try{
    payload=text ? JSON.parse(text) : {};
  }catch(_err){
    const snippet=(text||'').trim().slice(0,180) || `${res.status} ${res.statusText}`;
    throw new Error(`HTTP ${res.status}: ${snippet}`);
  }
  if(!res.ok){
    throw new Error(payload&&payload.error ? payload.error : `HTTP ${res.status}`);
  }
  return payload;
}

const api={
  async load(rolloutDir,logFile){
    const q=new URLSearchParams({rollout_dir:rolloutDir});
    if(logFile) q.set('log_file',logFile);
    return requestJson(BASE+'/api/load-data?'+q);
  },
  async state(){return requestJson(BASE+'/api/state')},
  async steps(){return requestJson(BASE+'/api/steps')},
  async groups(step,stepKey,task){
    const q=new URLSearchParams({limit:500});
    if(step!=null) q.set('step',step);
    if(stepKey) q.set('step_key',stepKey);
    if(task&&task!='all') q.set('task',task);
    return requestJson(BASE+'/api/groups?'+q);
  },
  async group(uid,maxFrames=30){
    return requestJson(`${BASE}/api/group/${encodeURIComponent(uid)}?max_frames=${maxFrames}`);
  },
  async groupTimeline(uid,maxFrames=30,timelineFps=1){
    return requestJson(`${BASE}/api/group/${encodeURIComponent(uid)}?max_frames=${maxFrames}&timeline_fps=${timelineFps}`);
  },
};

/* ═══════════════ LOAD ═══════════════ */
async function doLoad(){
  const dir=document.getElementById('rolloutDir').value.trim();
  if(!dir){setStatus('请输入 rollout 目录路径',false);return;}
  const btn=document.getElementById('loadBtn');
  btn.disabled=true; btn.textContent='加载中…';
  try{
    const res=await api.load(dir,document.getElementById('logFile').value.trim()||null);
    if(res.ok){applyState(res.summary);}
    else setStatus('加载失败: '+(res.error||'unknown'),false);
  }catch(e){setStatus('网络错误: '+e.message,false);}
  btn.disabled=false; btn.textContent='加载数据';
}
function setStatus(msg,ok=true){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;el.style.color=ok?'#93c5fd':'#fb7185';
}

/* ═══════════════ SUMMARY ═══════════════ */
function applyState(summary){
  curSummary=summary;
  document.getElementById('statGroups').textContent=summary.group_count??'—';
  document.getElementById('statSamples').textContent=summary.sample_count??'—';
  document.getElementById('statSteps').textContent=summary.step_count??'—';
  const seg=(summary.temporal_ratio??0)*100;
  document.getElementById('statSeg').textContent=seg.toFixed(1)+'%';
  const curve=summary.step_curve||[];
  if(curve.length) document.getElementById('statRew').textContent=(curve[curve.length-1].reward??0).toFixed(3);

  // Build chart data: overall + per-task
  chartData={};
  if(curve.length) chartData['overall']=curve.map(p=>({step:p.step,v:p.reward}));
  const tc=summary.task_curves||{};
  Object.entries(tc).forEach(([t,pts])=>{chartData[t]=pts.map(p=>({step:p.step,v:p.reward}));});

  buildLegend();
  drawChart(+document.getElementById('smoothSlider').value/100);
  initTrainingMetrics(summary);
  setStatus(`✓ 已加载: ${summary.group_count} groups / ${summary.sample_count} samples / ${summary.step_count} batches`);
  loadSteps();
}

/* ═══════════════ CHART ═══════════════ */
const CCOLORS={overall:'#475569',temporal_seg:'#e11d48',add:'#2563eb',
  'delete':'#059669',replace:'#d97706',sort:'#7c3aed',aot_v2t:'#0f766e',aot_t2v:'#be185d'};
function ema(data,a){
  if(a<.01)return[...data];
  let s=[data[0]];
  for(let i=1;i<data.length;i++) s.push(a*s[i-1]+(1-a)*data[i]);
  return s;
}
function drawChart(a=.6){
  const svg=document.getElementById('rewardChart');
  const W=820,H=180,PL=38,PR=10,PT=12,PB=28;
  const pw=W-PL-PR, ph=H-PT-PB;
  if(!Object.keys(chartData).length){svg.innerHTML='';return;}
  const allSteps=[...new Set(Object.values(chartData).flatMap(pts=>pts.map(p=>p.step)))].sort((a,b)=>a-b);
  if(!allSteps.length) return;
  const minS=allSteps[0], maxS=allSteps[allSteps.length-1];
  const xs=s=>PL+((s-minS)/Math.max(1,maxS-minS))*pw;
  const ys=v=>PT+(1-Math.max(0,Math.min(1,v)))*ph;
  let d='';
  [0,.25,.5,.75,1].forEach(v=>{
    const y=ys(v);
    d+=`<line x1="${PL}" y1="${y}" x2="${PL+pw}" y2="${y}" stroke="rgba(100,116,139,.08)" stroke-width="1"/>`;
    d+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#6b7280">${v.toFixed(2)}</text>`;
  });
  [minS,...allSteps.filter((_,i,arr)=>i==0||i==arr.length-1||(i%Math.max(1,Math.floor(arr.length/5))===0))].filter((v,i,a)=>a.indexOf(v)===i).forEach(s=>{
    const x=xs(s);
    d+=`<text x="${x}" y="${H-8}" text-anchor="middle" font-size="9" fill="#6b7280">${s}</text>`;
    d+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${H-PB}" stroke="rgba(100,116,139,.05)" stroke-width="1"/>`;
  });
  d+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="rgba(100,116,139,.2)" stroke-width="1"/>`;
  d+=`<line x1="${PL}" y1="${H-PB}" x2="${PL+pw}" y2="${H-PB}" stroke="rgba(100,116,139,.2)" stroke-width="1"/>`;
  Object.entries(chartData).forEach(([name,pts])=>{
    if(hiddenCurves.has(name)) return;
    const color=CCOLORS[name]||taskColor(name);
    const vs=pts.map(p=>p.v);
    const sm=ema(vs,a);
    const path=pts.map((p,i)=>`${xs(p.step)},${ys(sm[i])}`).join(' ');
    const isAll=name==='overall';
    d+=`<polyline points="${path}" fill="none" stroke="${color}" stroke-width="${isAll?2.5:1.5}" stroke-opacity="${isAll?.92:.7}"/>`;
  });
  svg.innerHTML=d;
}
function buildLegend(){
  const el=document.getElementById('chartLegend');
  el.innerHTML=Object.keys(chartData).map(n=>{
    const c=CCOLORS[n]||taskColor(n);
    return `<div class="legend-item" id="leg-${n}" onclick="toggleCurve('${n}')">
      <div class="legend-dot" style="background:${c}"></div>
      <span style="color:${c}">${n}</span></div>`;
  }).join('');
}
function toggleCurve(n){
  hiddenCurves.has(n)?hiddenCurves.delete(n):hiddenCurves.add(n);
  const el=document.getElementById('leg-'+n);
  if(el) el.style.opacity=hiddenCurves.has(n)?.3:1;
  drawChart(+document.getElementById('smoothSlider').value/100);
}
function onSmooth(v){
  document.getElementById('smoothVal').textContent=(v/100).toFixed(2);
  drawChart(v/100);
}

let trainingMetrics=[], activeMetricTab='kl';

const METRIC_GROUPS={
  kl:{
    label:'KL 散度',
    keys:['kl_loss','ppo_kl'],
    colors:{'kl_loss':'#e11d48','ppo_kl':'#7c3aed'},

      kl_loss:'KL Loss — 当前策略与参考策略之间的 KL 散度惩罚项。衡量策略偏离初始模型的程度。持续增长说明策略在快速漂移，可能导致训练不稳定或 reward hacking；若一直为 0，可能 KL 惩罚系数过大，策略难以更新。理想情况是随训练缓慢增长。',
      ppo_kl:'PPO KL — 通过 importance sampling ratio 近似估算的 KL 散度。与 KL Loss 互为参照：二者都很小说明策略更新保守；大幅跳升预示可能的训练崩溃。'

      lr:'Learning Rate — 当前学习率。对照 grad_norm 和 loss 曲线观察：warmup 阶段 LR 上升时 loss 应稳步下降；decay 阶段 LR 下降时 loss 可能趋于平稳。'

function buildMetricTabs(){
  const el=document.getElementById('metricTabs');
  el.innerHTML=Object.entries(METRIC_GROUPS).map(([id,g])=>{
    const tipText=Object.values(g.desc).join('\n');
    return `<div class="metric-tab${id===activeMetricTab?' active':''}" onclick="switchMetricTab('${id}')" title="${tipText.replace(/"/g,'&quot;')}">${g.label}</div>`;
  }).join('');
}
function switchMetricTab(id){
  activeMetricTab=id;
  document.querySelectorAll('.metric-tab').forEach(t=>t.classList.remove('active'));
  const tabs=document.getElementById('metricTabs').children;
  for(const t of tabs){ if(t.textContent===METRIC_GROUPS[id].label) t.classList.add('active'); }
  drawMetricsChart();
}
function drawMetricsChart(){
  const svg=document.getElementById('metricsChart');
  const tooltip=document.getElementById('metricTooltip');
  if(!trainingMetrics.length){svg.innerHTML='';tooltip.textContent='';return;}
  const grp=METRIC_GROUPS[activeMetricTab];
  if(!grp){svg.innerHTML='';return;}

  // Show combined description
  tooltip.textContent=Object.values(grp.desc).join(' ');

  const W=820,H=200,PL=50,PR=grp.dual_axis?50:10,PT=14,PB=28;
  const pw=W-PL-PR, ph=H-PT-PB;
  const steps=trainingMetrics.map(m=>m.step);
  const minS=Math.min(...steps), maxS=Math.max(...steps);
  const xs=s=>PL+((s-minS)/Math.max(1,maxS-minS))*pw;

  let d='';
  // grid lines
  const firstKey=grp.keys[0];
  const allVals=grp.dual_axis
    ? trainingMetrics.map(m=>m[firstKey]).filter(v=>v!=null)
    : grp.keys.flatMap(k=>trainingMetrics.map(m=>m[k]).filter(v=>v!=null));
  let vMin=Math.min(...allVals), vMax=Math.max(...allVals);
  if(vMin===vMax){vMin-=0.01;vMax+=0.01;}
  const ys=v=>PT+(1-(v-vMin)/Math.max(1e-12,vMax-vMin))*ph;

  // right axis for dual_axis
  let vMin2=0,vMax2=1,ys2=v=>PT+(1-v)*ph;
  if(grp.dual_axis && grp.keys.length>1){
    const k2=grp.keys[1];
    const vals2=trainingMetrics.map(m=>m[k2]).filter(v=>v!=null);
    vMin2=Math.min(...vals2);vMax2=Math.max(...vals2);
    if(vMin2===vMax2){vMin2-=1e-7;vMax2+=1e-7;}
    ys2=v=>PT+(1-(v-vMin2)/Math.max(1e-12,vMax2-vMin2))*ph;
  }

  // Y axis ticks
  for(let i=0;i<=4;i++){
    const frac=i/4;
    const y=PT+(1-frac)*ph;
    const val=vMin+frac*(vMax-vMin);
    d+=`<line x1="${PL}" y1="${y}" x2="${PL+pw}" y2="${y}" stroke="rgba(100,116,139,.08)" stroke-width="1"/>`;
    d+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#6b7280">${val<0.001&&val>-0.001?val.toExponential(1):val.toFixed(3)}</text>`;
  }
  if(grp.dual_axis && grp.keys.length>1){
    for(let i=0;i<=4;i++){
      const frac=i/4;
      const y=PT+(1-frac)*ph;
      const val=vMin2+frac*(vMax2-vMin2);
      d+=`<text x="${PL+pw+4}" y="${y+4}" text-anchor="start" font-size="9" fill="${grp.colors[grp.keys[1]]}">${val<0.001&&val>-0.001?val.toExponential(1):val.toFixed(4)}</text>`;
    }
  }
  // X axis
  const xTicks=[minS,...steps.filter((_,i,arr)=>i===0||i===arr.length-1||(i%Math.max(1,Math.floor(arr.length/6))===0))].filter((v,i,a)=>a.indexOf(v)===i);
  xTicks.forEach(s=>{
    const x=xs(s);
    d+=`<text x="${x}" y="${H-8}" text-anchor="middle" font-size="9" fill="#6b7280">${s}</text>`;
    d+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${H-PB}" stroke="rgba(100,116,139,.05)" stroke-width="1"/>`;
  });
  d+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="rgba(100,116,139,.2)" stroke-width="1"/>`;
  d+=`<line x1="${PL}" y1="${H-PB}" x2="${PL+pw}" y2="${H-PB}" stroke="rgba(100,116,139,.2)" stroke-width="1"/>`;

  // Draw curves
  grp.keys.forEach((k,ki)=>{
    const color=grp.colors[k]||'#475569';
    const useRight=grp.dual_axis&&ki>0;
    const yFn=useRight?ys2:ys;
    const pts=trainingMetrics.filter(m=>m[k]!=null);
    if(!pts.length)return;
    const path=pts.map(m=>`${xs(m.step)},${yFn(m[k])}`).join(' ');
    d+=`<polyline points="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-opacity=".85"/>`;
  });

  // Legend
  d+=grp.keys.map((k,i)=>{
    const color=grp.colors[k]||'#475569';
    const lx=PL+8+i*120;
    return `<rect x="${lx}" y="2" width="10" height="10" rx="2" fill="${color}" opacity=".85"/>
      <text x="${lx+14}" y="10" font-size="10" fill="${color}" font-weight="600">${grp.labels[k]||k}</text>`;
  }).join('');

  svg.innerHTML=d;

  // Hover interaction: show individual metric description
  svg.onmousemove=function(e){
    const rect=svg.getBoundingClientRect();
    const svgX=(e.clientX-rect.left)/rect.width*W;
    // Find closest step
    let closestIdx=0,closestDist=Infinity;
    trainingMetrics.forEach((m,i)=>{
      const dist=Math.abs(xs(m.step)-svgX);
      if(dist<closestDist){closestDist=dist;closestIdx=i;}
    });
    const m=trainingMetrics[closestIdx];
    const vals=grp.keys.map(k=>`${grp.labels[k]||k}: ${m[k]!=null?(m[k]<0.001&&m[k]>-0.001?m[k].toExponential(3):m[k].toFixed(4)):'N/A'}`);
    tooltip.textContent=`Step ${m.step} — ${vals.join(' | ')}`;
  };
  svg.onmouseleave=function(){
    tooltip.textContent=Object.values(grp.desc)[0];
  };
}
function initTrainingMetrics(summary){
  trainingMetrics=summary.training_metrics||[];
  const sec=document.getElementById('trainingMetricsSection');
  if(trainingMetrics.length>0){
    sec.style.display='';
    buildMetricTabs();
    drawMetricsChart();
  }else{
    sec.style.display='none';
  }
}

async function loadGroups(){
  const task=document.getElementById('sidebarTask').value;

  // Try preloaded data first (works even when API proxy blocks requests)
  const pre=window.__PRELOADED__;
  if(pre&&pre.all_groups){
    let gs=pre.all_groups;
    if(curStepKey) gs=gs.filter(g=>g.step_key===curStepKey);
    else if(curStep!=null) gs=gs.filter(g=>g.step==curStep);
    if(task&&task!='all') gs=gs.filter(g=>g.problem_type==task);
    curStepGroups=gs;
    renderGroupList(curStepGroups);
    if(curStepGroups.length) selectGroup(curStepGroups[0].uid);
    return;
  }

  // Fallback: API call
  try{
    const res=await api.groups(curStep,curStepKey,task);
    if(!res.ok){document.getElementById('groupList').innerHTML='<div style="padding:12px;color:var(--danger);font-size:12px">加载失败</div>';return;}
    curStepGroups=res.groups||[];
    renderGroupList(curStepGroups);
    if(curStepGroups.length) selectGroup(curStepGroups[0].uid);
  }catch(e){
    document.getElementById('groupList').innerHTML='<div style="padding:12px;color:var(--danger);font-size:12px">加载失败: '+e.message+'</div>';
  }
}
function filterGroups(){loadGroups();}
function renderGroupList(gs){

        <span style="font-weight:700;color:${rc}">${g.mean_reward.toFixed(3)}</span>

/* ═══════════════ GROUP DETAIL ═══════════════ */
async function renderGroup(uid){
  const main=document.getElementById('groupMain');

  let g;
  let lazyFrames=false;   // true = preloaded text only, frames loading in background
  const pre=window.__PRELOADED__;
  const preloadedGroup=pre&&pre.all_details&&pre.all_details[uid] ? pre.all_details[uid] : null;
  const cachedFrames=_framesCache[uid];

  if(preloadedGroup && cachedFrames){
    // Both text and frames ready — merge and render fully
    g=Object.assign({},preloadedGroup,cachedFrames);
  } else if(preloadedGroup && !cachedFrames){
    // Text available immediately; frames will lazy-load after first paint
    g=preloadedGroup;
    lazyFrames=true;
  } else {
    // No preloaded data — single API call (includes frames)
    main.innerHTML='<div class="card" style="padding:20px;text-align:center"><span class="spin"></span> 加载中…</div>';
    try{
      const res=await api.group(uid,30);
      g=res.group;
    }catch(e){
      main.innerHTML='<div class="card" style="padding:20px;color:var(--danger)">加载失败: '+e.message+'</div>';return;
    }
  }
  const frames=g.frame_strip||[];
  const clipBounds=g.clip_boundaries||[];
  const nF=frames.length;
  const maxT=Number(g.timeline_max_t)||nF||60;
  const innerW=Math.max(nF,1)*STRIDE+16;
  const task=g.problem_type||'';
  const nClips=clipBounds.length||1;

  // Build frame HTML
  const modSeg=g.modification_seg||null;
  const missingIdx=g.missing_clip_index;
  // Store frames globally for zoom access
  window._currentFrames=frames;

  // Determine step label for each clip
  function clipStepLabel(ci){
    if(missingIdx==null) return ci+1;
    return ci<missingIdx ? ci+1 : ci+2;
  }

  function makeFrameItem(src,idx){
    const ts=nF>1?Math.round(idx*maxT/(nF-1)):0;
    const inM=modSeg&&ts>=modSeg.start&&ts<=modSeg.end;
    const ci=getClipIndex(idx,clipBounds);
    const clipColor=CLIP_COLORS[ci%CLIP_COLORS.length];
    const stepNum=clipStepLabel(ci);
    const borderStyle=nClips>1?`border-color:${clipColor}`:'';
    const imgHTML=src?`<img src="${src}" alt="${ts}s"/>`:`<span>${ts}s</span>`;
    const clipBadge=nClips>1?`<span class="frame-clip-badge" style="background:${clipColor}">S${stepNum}</span>`:'';
    return `<div class="frame-item" onclick="zoomFrame(${idx})">
      <div class="frame-img${inM?' mod':''}" style="${borderStyle}">
        ${imgHTML}${inM?'<span class="frame-mod-badge">mod</span>':''}${clipBadge}
      </div>
      <div class="frame-label">${ts}s</div>
    </div>`;
  }

  // Build frame strip with [MISSING] placeholder
  let frameParts=[];
  if(missingIdx!=null&&nClips>0){
    // Insert frames grouped by clip, with MISSING placeholder at the right position
    for(let ci=0;ci<nClips;ci++){
      if(ci===missingIdx){
        frameParts.push(`<div class="frame-item" style="width:80px;flex-shrink:0">
          <div style="width:80px;height:60px;border-radius:7px;border:2px dashed #fb7185;
            display:flex;align-items:center;justify-content:center;font-size:18px;color:#fb7185;
            background:rgba(251,113,133,.08)">❓</div>
          <div class="frame-label" style="color:#fb7185;font-weight:600">MISSING</div>
        </div>`);
      }
      const start=clipBounds[ci];
      const end=ci<nClips-1?clipBounds[ci+1]:nF;
      for(let j=start;j<end;j++) frameParts.push(makeFrameItem(frames[j],j));
    }
    // If missing is after all clips
    if(missingIdx>=nClips){
      frameParts.push(`<div class="frame-item" style="width:80px;flex-shrink:0">
        <div style="width:80px;height:60px;border-radius:7px;border:2px dashed #fb7185;
          display:flex;align-items:center;justify-content:center;font-size:18px;color:#fb7185;
          background:rgba(251,113,133,.08)">❓</div>
        <div class="frame-label" style="color:#fb7185;font-weight:600">MISSING</div>
      </div>`);
    }
  } else {
    frameParts=(nF>0?frames:['']).map((s,i)=>makeFrameItem(s,i));
  }
  const framesHTML=frameParts.join('');

  // Meta bar
  let html=`
    <div class="card" style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span class="badge" style="border-color:${taskColor(task)}66">${task}</span>
      <span class="badge">step ${g.step}</span>
      <span class="badge">uid ${g.uid}</span>
      <span class="badge">n=${(g.attempts||[]).length}</span>
      <span class="badge" style="border-color:${rewColor(g.mean_reward).replace('#','rgba(').replace('fb7185','251,113,133,.5)').replace('34d399','52,211,153,.5)').replace('f59e0b','245,158,11,.5)')}">
        μ reward ${Number(g.mean_reward).toFixed(3)}
      </span>
    </div>`;

  const promptText=promptToPlainText(g.prompt||'');
  if(promptText){
    html+=`
      <div class="card" style="padding:12px 14px">
        <h3 style="margin-bottom:8px">📝 问题</h3>
        <pre class="mono">${esc(promptText)}</pre>
      </div>`;
  }

  if(task==='temporal_seg'){
    /* ── Temporal seg: synchronized frame + timeline ── */
    const attempts=g.attempts||[];

    if(lazyFrames){
      /* Frames not yet loaded: show rollout text immediately with a "loading timeline" panel */
      html+=`
        <div class="card" style="padding:14px;display:flex;align-items:center;gap:10px">
          <span class="spin"></span>
          <span style="font-size:12px;color:var(--muted)">正在加载 1fps 时间轴帧，请稍候…</span>
        </div>`;
    } else {
    const timelineFrames=(g.timeline_frame_strip||[]).length
      ? g.timeline_frame_strip
      : (nF>0 ? frames.map((src,idx)=>{
          const sec=nF>1?Math.round((idx*Math.max(1,maxT))/Math.max(1,nF-1)):0;
          return {second:sec,timestamp:formatMMSS(sec),src};
        }) : []);
    window._currentFrames=timelineFrames.map(f=>f.src||'');
    const timelineMaxSec=Math.max(0, Math.ceil(maxT));
    const timelineWidth=Math.max((timelineFrames.length||1)*SEG_STRIDE, 600);
    const toLeft=t=>(Math.max(0,_num(t))*SEG_STRIDE).toFixed(1)+'px';
    const toWidth=(s,e)=>(Math.max(SEG_STRIDE-8, (_num(e)-_num(s))*SEG_STRIDE-8)).toFixed(1)+'px';
    const tickStep=Math.max(1, Math.ceil(Math.max(1,timelineMaxSec)/8));
    let ruler='';
    for(let t=0;t<=timelineMaxSec;t+=tickStep){
      const px=(t*SEG_STRIDE).toFixed(1);
      ruler+=`<span class="tl-tick" style="left:${px}px">${t}s</span>`;
    }
    if(timelineMaxSec>0&&timelineMaxSec%tickStep!==0){
      const px=(timelineMaxSec*SEG_STRIDE).toFixed(1);
      ruler+=`<span class="tl-tick" style="left:${px}px">${timelineMaxSec}s</span>`;
    }
    // GT segments (use first attempt that has ground_truth segs)
    let gtSegsHTML='';
    for(const att of attempts){
      const gts=(att.temporal_segments||{}).ground_truth||[];
      if(gts.length){
        gtSegsHTML=gts.map(([s,e])=>
          `<div class="seg-blk" style="left:${toLeft(s)};width:${toWidth(s,e)};background:#f87171"></div>`
        ).join('');
        break;
      }
    }
    const timelineFramesHTML=timelineFrames.map((frame,idx)=>{
      const sec=_num(frame.second, idx);
      const ts=frame.timestamp||formatMMSS(sec);
      const src=frame.src||'';
      const imgHTML=src?`<img src="${src}" alt="${ts}" draggable="false"/>`:`<span>${ts}</span>`;
      return `<div class="timeline-frame-item" onclick="zoomFrame(${idx})">
        <div class="timeline-frame-thumb">${imgHTML}</div>
        <div class="timeline-frame-label">${ts}</div>
      </div>`;
    }).join('');
    // Per-attempt pred lanes
    const predLanes=attempts.map((r,ri)=>{
      const rc=rewColor(r.reward);
      const segs=(r.temporal_segments||{}).predicted||[];
      const segHTML=segs.map(([s,e])=>
        `<div class="seg-blk" style="left:${toLeft(s)};width:${toWidth(s,e)};background:${rc}"></div>`
      ).join('');
      return `<div class="tl-lane" style="margin-bottom:3px">${segHTML}</div>`;
    }).join('');

    const labelItems=[
      `<div style="height:${timelineFrames.length>0?74:20}px"></div>`,
      `<div style="height:26px"></div>`,               // spacer for ruler
      `<div class="tl-label-item" style="height:22px;color:#f87171">
         <div class="tl-dot" style="background:#f87171"></div>GT
       </div>`,
      `<div style="height:7px"></div>`,
      ...attempts.map((r,ri)=>{
        const rc=rewColor(r.reward);
        return `<div class="tl-label-item" style="height:21px;color:${rc}">
          <div class="tl-dot" style="background:${rc}"></div>
          R${ri+1}&nbsp;<span style="font-size:9px">${r.reward.toFixed(2)}</span>
        </div>`;
      }),
    ].join('');

    html+=`
      <div class="card" style="padding:14px">
        <h3 style="margin-bottom:10px">
          📽 1fps 帧条 + ⏱ 时间轴
          <span class="muted">（同步滚动 · ${timelineMaxSec}s · ${timelineFrames.length} 帧）</span>
        </h3>
        <div style="display:flex;gap:0;align-items:flex-start">
          <div style="width:${LABEL_W}px;flex-shrink:0;display:flex;flex-direction:column">${labelItems}</div>
          <div class="sync-shell" style="flex:1" id="so-${uid}">
            <div class="sync-inner" style="width:${timelineWidth}px">
              <div class="timeline-frame-row">${timelineFramesHTML}</div>
              <div style="position:relative;height:18px;margin:4px 0 6px">${ruler}</div>
              <div class="tl-lane" style="margin-bottom:7px">${gtSegsHTML}</div>
              <div style="height:1px;background:rgba(100,116,139,.08);margin-bottom:3px"></div>
              ${predLanes}
            </div>
          </div>
        </div>
        <div class="scroll-control" style="margin-left:${LABEL_W}px">
          <div class="meta">拖动时间轴</div>
          <input type="range" class="scroll-slider" min="0" max="1000" value="0" id="ss-${uid}"
            oninput="syncScroll('${uid}',this.value)"/>
          <div class="meta">0-${timelineMaxSec}s</div>
        </div>
      </div>`;

    // GT text
    const gtText=(attempts[0]||{}).response||g.ground_truth||'';
    if(gtText) html+=`
      <div class="card" style="padding:12px 14px">
        <h3 style="margin-bottom:8px">📄 Ground Truth</h3>
        <pre class="mono">${esc(String(g.ground_truth||'').slice(0,600))}</pre>
      </div>`;

    } // end else (timeline ready)

    // Rollout responses — always shown immediately (text only, no frames needed)
    html+=`<div class="card" style="padding:14px"><h3 style="margin-bottom:8px">🔄 Rollout 详情</h3>`;
    attempts.forEach((r,ri)=>{
      const rc=rewColor(r.reward);
      html+=`<div style="padding:8px 0;border-bottom:1px solid rgba(100,116,139,.08);display:grid;gap:4px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="badge">Rollout #${ri+1}</span>
          <span style="color:${rc};font-weight:700">${r.reward.toFixed(3)}</span>
        </div>
        <pre class="mono">${esc(String(r.response||''))}</pre>
      </div>`;
    });
    html+='</div>';

  } else {
    /* ── Non-seg tasks: standalone frame strip ── */
    let modBand='';
    if(modSeg){
      const p1=((modSeg.start/maxT)*100).toFixed(1);
      const pw2=(((modSeg.end-modSeg.start)/maxT)*100).toFixed(1);
      modBand=`<div class="mod-band">
        <span style="color:#fbbf24;font-weight:700">✂ 修改区域</span>
        <span style="color:#fbbf24">${modSeg.start}s – ${modSeg.end}s</span>
        <span style="color:var(--muted)">${modSeg.description||''}</span>
        <div class="mod-timeline">
          <div class="mod-timeline-seg" style="left:${p1}%;width:${pw2}%"></div>
        </div>
      </div>`;
    }
    let clipLegendItems=clipBounds.map((b,i)=>{
      const sn=clipStepLabel(i);
      return `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;margin-left:6px"><span style="width:8px;height:8px;border-radius:50%;background:${CLIP_COLORS[i%CLIP_COLORS.length]}"></span>Step ${sn}</span>`;
    });
    if(missingIdx!=null){
      clipLegendItems.splice(missingIdx,0,`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;margin-left:6px;color:#fb7185">❓ Step ${missingIdx+1} MISSING</span>`);
    }
    const clipLegend=nClips>1?clipLegendItems.join(''):'';
    // When frames are still loading: show animated skeleton placeholders
    const frameStripContent=lazyFrames
      ? Array(8).fill('<div class="frame-skeleton-item"></div>').join('')
      : framesHTML;
    const lazyBarHTML=lazyFrames
      ? '<div class="frames-lazy-bar"><span class="spin"></span> 视频帧加载中…</div>'
      : '';
    html+=`
      <div class="card" style="padding:14px;min-width:0">
        <h3 style="margin-bottom:10px">📽 输入帧条 <span class="muted">（${nClips} clip${nClips>1?'s':''}, ${lazyFrames?'…':nF} 帧 · 点击帧可放大）</span>${clipLegend}</h3>
        ${lazyBarHTML}
        <div id="ft-${uid}" style="display:flex;gap:${FG}px;padding:10px 8px;overflow-x:scroll;border-radius:8px;border:1px solid rgba(100,116,139,.15);background:rgba(241,245,249,.6);-webkit-overflow-scrolling:touch">${frameStripContent}</div>
        ${modBand}
        <div style="padding:6px 0 2px;display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--muted)">0s</span>
          <input type="range" style="flex:1;accent-color:#34d399;height:24px" min="0" max="${Math.max(1,nF-1)}" value="0"
            oninput="scrollFT('${uid}',this.value,${nF})"/>
          <span style="font-size:10px;color:var(--muted)">${maxT}s</span>
        </div>
      </div>`;

    if(task==='sort') html+=renderSort(g);
    else              html+=renderChoice(g);
  }

  main.innerHTML=html;
  if(task==='temporal_seg'&&!lazyFrames) initSegTimelineScroll(uid);

  // Lazy frame loading: fetch frames in background, then re-render this group
  if(lazyFrames){
    const timelineFps=(task==='temporal_seg')?1:0;
    fetch(`${BASE}/api/group/${encodeURIComponent(uid)}/frames?max_frames=30&timeline_fps=${timelineFps}`)
      .then(r=>r.json())
      .then(data=>{
        if(!data.ok) return;
        const frames=data.frames||[];
        // If server returned no frames, show diagnostic info instead of blank skeleton
        if(frames.length===0){
          const ft=document.getElementById('ft-'+uid);
          if(ft){
            const diag=data.diag||{};
            const paths=diag.paths||[];
            const allMissing=paths.length>0 && paths.every(p=>!p.exists);
            const decordMissing=diag.decord_available===false;
            const hasB64=diag.has_base64===true;
            let html='<div style="padding:10px;display:grid;gap:5px">';
            html+='<div style="font-size:11px;font-weight:600;color:var(--danger)">服务器未能读取视频帧</div>';
            if(decordMissing)
              html+='<div style="font-size:11px;color:var(--warn)">⚠ decord 未安装 — 请在服务器端运行 pip install decord</div>';
            if(hasB64)
              html+='<div style="font-size:11px;color:var(--ok)">✓ 数据含内嵌 base64 帧（应可正常解码，请检查服务端日志）</div>';
            if(paths.length===0 && !decordMissing)
              html+='<div style="font-size:11px;color:var(--muted)">未检测到视频路径字段</div>';
            for(const p of paths){
              const color=p.exists?'var(--ok)':'var(--danger)';
              const icon=p.exists?'✓':'✗';
              const note=p.exists&&!p.is_file?' （非文件？）':'';
              html+=`<div style="font-size:10px;color:${color};word-break:break-all">${icon} ${p.path}${note}</div>`;
              if(!p.exists && p.resolved!==p.path)
                html+=`<div style="font-size:10px;color:var(--muted);word-break:break-all;padding-left:14px">已解析为: ${p.resolved}</div>`;
            }
            html+='</div>';
            ft.innerHTML=html;
          }
          return;
        }
        _framesCache[uid]={
          frame_strip: frames,
          clip_boundaries: data.clip_boundaries||[],
          timeline_frame_strip: data.timeline_frame_strip||[],
          timeline_max_t: data.timeline_max_t||null,
        };
        // Re-render only if user is still viewing this group
        if(document.getElementById('gr-'+uid)?.classList.contains('active')){
          renderGroup(uid);
        }
      })
      .catch(()=>{
        // fetch itself failed — server unreachable (wrong port, crashed, firewall…)
        const ft=document.getElementById('ft-'+uid);
        if(ft) ft.innerHTML='<div style="padding:8px;color:var(--danger);font-size:11px">网络或服务器错误 — 无法连接到可视化服务器，请检查端口是否开放及 server.py 是否仍在运行</div>';
      });
  }
}

/* ═══════════════ SCROLL ═══════════════ */
function syncScroll(uid,val){
  const o=document.getElementById('so-'+uid);
  if(!o) return;
  const maxScroll=Math.max(0,o.scrollWidth-o.clientWidth);
  if(maxScroll<=0) return;
  o.scrollLeft=(Number(val)/1000)*maxScroll;
}
function updateSyncSlider(uid){
  const o=document.getElementById('so-'+uid);
  const s=document.getElementById('ss-'+uid);
  if(!o||!s) return;
  const maxScroll=Math.max(0,o.scrollWidth-o.clientWidth);
  s.value=maxScroll>0 ? String(Math.round((o.scrollLeft/maxScroll)*1000)) : '0';
}
function scrollFT(uid,val,n){
  const t=document.getElementById('ft-'+uid);
  if(!t) return;
  t.scrollLeft=(val/Math.max(1,n-1))*(t.scrollWidth-t.clientWidth);
}
function initSegTimelineScroll(uid){
  const shell=document.getElementById('so-'+uid);
  const slider=document.getElementById('ss-'+uid);
  if(!shell||!slider) return;
  const syncFromScroll=()=>updateSyncSlider(uid);
  shell.addEventListener('scroll', syncFromScroll, {passive:true});
  updateSyncSlider(uid);
  let dragging=false, startX=0, startLeft=0;
  const onMove=(e)=>{
    if(!dragging) return;
    const dx=e.clientX-startX;
    if(Math.abs(dx)>4) window._suppressFrameClickUntil=Date.now()+120;
    shell.scrollLeft=startLeft-dx;
  };
  const onUp=()=>{
    if(!dragging) return;
    dragging=false;
    shell.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  shell.addEventListener('mousedown', (e)=>{
    if(e.button!==0) return;
    dragging=true;
    startX=e.clientX;
    startLeft=shell.scrollLeft;
    shell.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  shell.addEventListener('touchstart', (e)=>{
    const touch=e.touches&&e.touches[0];
    if(!touch) return;
    dragging=true;
    startX=touch.clientX;
    startLeft=shell.scrollLeft;
  }, {passive:true});
  shell.addEventListener('touchmove', (e)=>{
    if(!dragging) return;
    const touch=e.touches&&e.touches[0];
    if(!touch) return;
    const dx=touch.clientX-startX;
    if(Math.abs(dx)>4) window._suppressFrameClickUntil=Date.now()+120;
    shell.scrollLeft=startLeft-dx;
  }, {passive:true});
  shell.addEventListener('touchend', ()=>{dragging=false;}, {passive:true});
}

/* ═══════════════ SORT ═══════════════ */
function renderSort(g){
  const sm=g.sort_meta||{};
  const gt=sm.gt_order||[];
  const attempts=g.attempts||[];
  const frames=g.frame_strip||[];
  const panels=attempts.map((r,ri)=>{
    const rc=rewColor(r.reward);
    const pred=r.pred_order||[];
    const cards=pred.map((id,pi)=>{
      const gi=gt.indexOf(id);
      const d=Math.abs(pi-gi);
      const cls=d===0?'s-ok':d===1?'s-d1':'s-d2';
      const dl=d===0?'✓0':pi>gi?`+${pi-gi}`:`${pi-gi}`;
      // show clip frame if available (clips are not indexed, just show position)
      return `
        <div class="sort-clip ${cls}">
          <div class="sort-clip-img"><span>clip ${id}</span></div>
          <div class="sort-clip-meta">
            <span style="font-size:10px;font-weight:700;color:var(--muted)">#${pi+1}→GT#${gi+1}</span>
            <span class="sort-clip-delta">Δ${dl}</span>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="sort-rollout-panel">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <span class="badge">Rollout #${ri+1}</span>
          <span style="color:${rc};font-weight:700;font-size:13px">${r.reward.toFixed(3)}</span>
          <span class="chip">Pred: ${pred.join('')}</span>
          <span class="chip">GT: ${gt.join('')}</span>
        </div>
        <div class="sort-grid">${cards||'<div class="muted" style="font-size:11px;padding:4px">未能解析预测顺序</div>'}</div>
        <pre class="mono">${esc(String(r.response||''))}</pre>
      </div>`;
  }).join('');
  return `
    <div class="card" style="padding:14px">
      <h3 style="margin-bottom:10px">🃏 Sort 可视化
        <span class="muted">— 每条 rollout 按预测顺序，边框 = 偏移量</span>
      </h3>
      <div style="display:flex;gap:12px;margin-bottom:10px;font-size:11px">
        <span><i style="display:inline-block;width:10px;height:10px;border:2px solid #34d399;border-radius:2px;margin-right:4px;vertical-align:middle"></i>Δ0</span>
        <span><i style="display:inline-block;width:10px;height:10px;border:2px solid #f59e0b;border-radius:2px;margin-right:4px;vertical-align:middle"></i>Δ1</span>
        <span><i style="display:inline-block;width:10px;height:10px;border:2px solid #fb7185;border-radius:2px;margin-right:4px;vertical-align:middle"></i>Δ≥2</span>
      </div>
      ${panels||'<div class="muted" style="font-size:12px">暂无 rollout 数据</div>'}
    </div>`;
}

/* ═══════════════ CHOICE ═══════════════ */
function renderChoice(g){
  const cm=g.choice_meta||{};
  const gtLetter=cm.gt_letter||'';
  const isVid=cm.option_type==='video';
  const attempts=g.attempts||[];
  const prompt=String(g.prompt||'');

  // Parse text options from prompt A. B. C. D.
  // Stop at next option letter, blank line, or end-of-string so the last option
  // does not swallow the CoT instruction block that follows.
  const optPat=/\b([A-D])\.\s+(.+?)(?=\n[A-D]\.\s|\n\n|$)/gs;
  const parsedOpts=[];
  let m;
  while((m=optPat.exec(prompt))!==null) parsedOpts.push({letter:m[1],text:m[2].trim()});

  let optHTML='';
  if(parsedOpts.length>=2){
    const cards=parsedOpts.map(o=>{
      const cls=o.letter===gtLetter&&attempts[0]?.pred_letter===o.letter?'c-both':
                o.letter===gtLetter?'c-gt':
                o.letter===(attempts[0]?.pred_letter||'')?'c-pred':'';
      const tag=cls==='c-both'?'✓ GT=Pred':cls==='c-gt'?'✓ GT':cls==='c-pred'?'← Pred':'';
      return `
        <div class="choice-text-card ${cls}">
          <div style="display:flex;gap:8px;align-items:center;font-size:12px">
            <b style="font-size:15px">${o.letter}.</b>
            ${tag?`<span class="chip">${tag}</span>`:''}
          </div>
          <div style="font-size:12px;line-height:1.5;color:#475569">${esc(o.text)}</div>
        </div>`;
    }).join('');
    optHTML=`<div class="choice-text-grid">${cards}</div>`;
  } else {
    optHTML=`<div class="muted" style="font-size:12px;padding:4px">
      GT: <b style="color:var(--ok)">${gtLetter||'—'}</b>
      <br/>选项无法从 prompt 自动解析，请在 rollout 数据中添加 options_list 字段
    </div>`;
  }

  const rolloutItems=attempts.map((r,i)=>{
    const rc=rewColor(r.reward);
    return `
      <div style="padding:8px 0;border-bottom:1px solid rgba(100,116,139,.08);display:grid;gap:4px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="badge">Rollout #${i+1}</span>
          <span style="color:${rc};font-weight:700;font-size:13px">${r.reward.toFixed(3)}</span>
          <span class="chip">Pred: ${r.pred_letter||'?'}</span>
          <span class="chip">GT: ${gtLetter||'?'}</span>
        </div>
        <pre class="mono">${esc(String(r.response||''))}</pre>
      </div>`;
  }).join('');
  const typeLabel=isVid?'选项为视频片段':'选项为文本';
  return `
    <div class="card" style="padding:14px">
      <h3 style="margin-bottom:8px">🎯 选项 <span class="muted">（${typeLabel}）</span></h3>
      ${optHTML}
    </div>
    <div class="card" style="padding:14px">
      <h3 style="margin-bottom:8px">🔄 Rollout 详情</h3>
      ${rolloutItems}
    </div>`;
}

/* ═══════════════ UTILS ═══════════════ */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _num(v,d=0){
  const n=Number(v);
  return Number.isFinite(n)?n:d;
}
function formatMMSS(totalSeconds){
  const total=Math.max(0, Math.round(_num(totalSeconds,0)));
  const mm=String(Math.floor(total/60)).padStart(2,'0');
  const ss=String(total%60).padStart(2,'0');
  return `${mm}:${ss}`;
}
function promptToPlainText(s){
  return String(s||'')
    .replace(/<\s*video\s*>/gi,'[video]')
    .replace(/<\s*image\s*>/gi,'[image]')
    .replace(/<\s*audio\s*>/gi,'[audio]')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
function zoomFrame(idx){
  if(window._suppressFrameClickUntil && Date.now() < window._suppressFrameClickUntil) return;
  const frames=window._currentFrames||[];
  const src=frames[idx];
  if(!src) return;
  const modal=document.getElementById('frameModal');
  document.getElementById('frameModalImg').src=src;
  modal.classList.add('active');
}
function getClipIndex(idx, boundaries){
  if(!boundaries||!boundaries.length) return 0;
  let ci=0;
  for(let i=1;i<boundaries.length;i++){
    if(idx>=boundaries[i]) ci=i; else break;
  }
  return ci;
}

/* ═══════════════ INIT ═══════════════ */
(async()=>{
  // Use server-injected pre-loaded data if available (no API call needed)
  const pre=window.__PRELOADED__;
  if(pre&&pre.summary&&pre.summary.group_count>0){
    if(pre.summary.rollout_dir) document.getElementById('rolloutDir').value=pre.summary.rollout_dir;
    applyStateWithSteps(pre.summary, pre.steps||[]);
    return;
  }

  // Fallback: try API calls
  try{
    const res=await api.state();
    if(res.ok&&res.summary&&res.summary.group_count>0){
      if(res.summary.rollout_dir) document.getElementById('rolloutDir').value=res.summary.rollout_dir;
      applyState(res.summary);
    }
  }catch(e){}
})();

function applyStateWithSteps(summary, steps){
  curSummary=summary;
  document.getElementById('statGroups').textContent=summary.group_count??'—';
  document.getElementById('statSamples').textContent=summary.sample_count??'—';
  document.getElementById('statSteps').textContent=summary.step_count??'—';
  const seg=(summary.temporal_ratio??0)*100;
  document.getElementById('statSeg').textContent=seg.toFixed(1)+'%';
  const curve=summary.step_curve||[];
  if(curve.length) document.getElementById('statRew').textContent=(curve[curve.length-1].reward??0).toFixed(3);
  chartData={};
  if(curve.length) chartData['overall']=curve.map(p=>({step:p.step,v:p.reward}));
  const tc=summary.task_curves||{};
  Object.entries(tc).forEach(([t,pts])=>{chartData[t]=pts.map(p=>({step:p.step,v:p.reward}));});
  buildLegend();
  drawChart(+document.getElementById('smoothSlider').value/100);
  initTrainingMetrics(summary);
  setStatus(`✓ 已加载: ${summary.group_count} groups / ${summary.sample_count} samples / ${summary.step_count} steps`);
  curSteps=steps;
  document.getElementById('stepCountLabel').textContent=curSteps.length+' steps';
  buildStepGrid();
}
</script>
