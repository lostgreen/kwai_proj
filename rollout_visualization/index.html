<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rollout Insight Studio</title>
<style>
:root{
  --bg:#0a0f1f; --panel:rgba(17,24,39,0.74); --border:rgba(148,163,184,0.22);
  --text:#e5e7eb; --muted:#9ca3af; --ok:#34d399; --warn:#f59e0b;
  --danger:#fb7185; --blue:#60a5fa; --violet:#a78bfa; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:radial-gradient(1200px 500px at 8% -10%,rgba(37,99,235,.35),transparent 70%),
    radial-gradient(900px 450px at 92% 0%,rgba(16,185,129,.26),transparent 65%),var(--bg);
  min-height:100vh}
.page{display:none;padding:20px;max-width:1440px;margin:0 auto}.page.active{display:block}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  backdrop-filter:blur(8px);box-shadow:0 8px 28px rgba(2,6,23,.24)}
h1{font-size:24px;font-weight:700}h2{font-size:17px;font-weight:700}
h3{font-size:13px;font-weight:600;color:#d1d5db}
.muted{color:var(--muted);font-size:12px}
.badge{font-size:11px;display:inline-block;border-radius:999px;padding:3px 9px;
  border:1px solid rgba(148,163,184,.35);color:#dbeafe;white-space:nowrap}
.chip{font-size:11px;display:inline-block;border-radius:6px;padding:2px 7px;
  background:rgba(148,163,184,.12);color:#cbd5e1}
.input,select{border-radius:10px;padding:9px 12px;font-size:13px;
  border:1px solid rgba(148,163,184,.3);background:rgba(15,23,42,.7);color:var(--text)}
.btn{border:none;font-weight:600;cursor:pointer;padding:9px 18px;font-size:13px;
  border-radius:10px;color:#08131f;background:linear-gradient(135deg,#7dd3fc,#34d399)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(148,163,184,.3);
  border-top-color:var(--ok);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Overview ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 0 14px}
.stat{padding:12px 14px}.stat .k{color:var(--muted);font-size:11px;margin-bottom:5px}
.stat .v{font-size:22px;font-weight:700}
.chart-section{padding:16px 18px;margin-bottom:12px}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;user-select:none;transition:opacity .2s}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chart-svg{display:block;background:rgba(2,6,23,.3);border:1px solid rgba(148,163,184,.18);border-radius:10px}
.smooth-control{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.smooth-control input[type=range]{accent-color:#34d399;width:130px;cursor:pointer}
.step-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px}
.step-card{padding:14px 16px;cursor:pointer;display:grid;gap:8px;transition:border-color .2s}
.step-card:hover{border-color:rgba(96,165,250,.5)}
.step-minibar{width:100%;height:5px;border-radius:999px;background:rgba(148,163,184,.18);overflow:hidden;display:flex;gap:1px}
/* ── Detail layout ── */
.detail-layout{display:grid;grid-template-columns:290px minmax(0,1fr);gap:12px}
.detail-header{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:12px;flex-wrap:wrap}
.back-btn{background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.25);
  color:var(--text);border-radius:10px;padding:6px 14px;font-size:13px;cursor:pointer}
.back-btn:hover{background:rgba(148,163,184,.22)}
.group-sidebar{padding:14px;display:grid;gap:8px;align-content:start;max-height:calc(100vh - 120px);overflow-y:auto}
.group-list{overflow-y:auto;border:1px solid rgba(148,163,184,.18);border-radius:10px;max-height:560px}
.group-row{padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(148,163,184,.1);display:grid;gap:3px}
.group-row:hover{background:rgba(96,165,250,.1)}.group-row.active{background:rgba(52,211,153,.14)}
.group-main{display:grid;gap:12px;align-content:start;overflow-y:auto;max-height:calc(100vh - 120px)}
/* ── Frame + timeline sync ── */
.sync-outer{overflow-x:auto;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.frame-item{flex-shrink:0;display:grid;gap:3px;width:100px;cursor:pointer}
.frame-img{width:100px;height:60px;border-radius:7px;border:2px solid rgba(148,163,184,.2);
  background:rgba(148,163,184,.1);display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--muted);position:relative;overflow:hidden;transition:border-color .2s}
.frame-img:hover{border-color:var(--blue);box-shadow:0 0 8px rgba(96,165,250,.3)}
.frame-img img{width:100%;height:100%;object-fit:cover;border-radius:5px}
.frame-img.mod{border-color:rgba(245,158,11,.65);background:rgba(245,158,11,.08)}
.frame-mod-badge{position:absolute;top:2px;right:2px;font-size:7px;padding:1px 3px;
  background:rgba(245,158,11,.85);border-radius:3px;color:#08131f;font-weight:700}
.frame-clip-badge{position:absolute;bottom:2px;left:2px;font-size:7px;padding:1px 4px;
  border-radius:3px;font-weight:700;color:#fff}
.frame-label{font-size:9px;color:var(--muted);text-align:center;line-height:1}
/* ── Frame zoom modal ── */
.frame-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.frame-modal-overlay.active{display:flex}
.frame-modal-overlay img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,.5)}
.sync-slider-row{padding:4px 0 2px;display:flex;align-items:center;gap:8px}
.sync-slider{flex:1;accent-color:#34d399;cursor:pointer}
.tl-label-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);white-space:nowrap}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-tick{position:absolute;top:0;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.tl-lane{position:relative;height:18px;border-radius:999px;background:rgba(148,163,184,.14);overflow:hidden}
.seg-blk{position:absolute;top:2px;bottom:2px;border-radius:999px;opacity:.9}
/* ── Modification band ── */
.mod-band{margin-top:8px;padding:7px 12px;border-radius:8px;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);
  display:flex;align-items:center;gap:10px;font-size:11px;flex-wrap:wrap}
.mod-timeline{flex:1;min-width:120px;height:8px;background:rgba(148,163,184,.15);border-radius:999px;position:relative}
.mod-timeline-seg{position:absolute;top:0;bottom:0;background:rgba(245,158,11,.6);border-radius:999px}
/* ── Sort ── */
.sort-rollout-panel{padding:10px 0;border-bottom:1px solid rgba(148,163,184,.1)}
.sort-rollout-panel:last-child{border-bottom:none}
.sort-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:6px}
.sort-clip{border-radius:10px;border:2px solid transparent;background:rgba(2,6,23,.4);overflow:hidden}
.sort-clip-img{width:100%;aspect-ratio:16/9;background:rgba(148,163,184,.1);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);position:relative;overflow:hidden}
.sort-clip-img img{width:100%;height:100%;object-fit:cover}
.sort-clip-meta{padding:3px 5px;display:flex;justify-content:space-between;align-items:center;font-size:10px}
.sort-clip-delta{font-size:9px;padding:1px 4px;border-radius:4px;font-weight:600}
.s-ok{border-color:rgba(52,211,153,.6)}.s-ok .sort-clip-delta{background:rgba(52,211,153,.2);color:#34d399}
.s-d1{border-color:rgba(245,158,11,.6)}.s-d1 .sort-clip-delta{background:rgba(245,158,11,.2);color:#f59e0b}
.s-d2{border-color:rgba(251,113,133,.55)}.s-d2 .sort-clip-delta{background:rgba(251,113,133,.2);color:#fb7185}
/* ── Choice ── */
.choice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:8px}
.choice-card{border-radius:10px;border:2px solid rgba(148,163,184,.22);background:rgba(2,6,23,.4);overflow:hidden}
.choice-card.c-both{border-color:rgba(167,139,250,.8)}
.choice-card.c-gt{border-color:rgba(52,211,153,.7)}
.choice-card.c-pred{border-color:rgba(96,165,250,.7)}
.choice-thumb{width:100%;aspect-ratio:16/9;background:rgba(148,163,184,.08);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);overflow:hidden;position:relative}
.choice-thumb img{width:100%;height:100%;object-fit:cover}
.choice-foot{padding:5px 8px;display:flex;justify-content:space-between;align-items:center;font-size:11px;gap:4px}
.choice-text-grid{display:grid;gap:7px}
.choice-text-card{border-radius:10px;border:2px solid rgba(148,163,184,.22);
  background:rgba(2,6,23,.4);padding:10px 12px;display:grid;gap:4px}
.choice-text-card.c-gt{border-color:rgba(52,211,153,.7)}
.choice-text-card.c-pred{border-color:rgba(96,165,250,.7)}
/* ── Misc ── */
.mono{font-family:"JetBrains Mono","Fira Code",monospace;font-size:11px;line-height:1.45;
  white-space:pre-wrap;word-break:break-word;padding:8px 10px;
  background:rgba(2,6,23,.38);border-radius:8px;border:1px solid rgba(148,163,184,.18);
  max-height:90px;overflow-y:auto;color:#94a3b8;margin-top:6px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,.25);border-radius:999px}
</style>
</head>
<body>

<!-- ═══════ PAGE 1: OVERVIEW ═══════ -->
<div id="pg-overview" class="page active">
  <div class="card" style="padding:16px 18px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px">
      <div>
        <h1>Rollout Insight Studio</h1>
        <p class="muted" style="margin-top:4px">多任务 RL 训练 rollout 可视化分析平台</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input id="rolloutDir" class="input" style="width:300px" placeholder="rollouts 目录路径"/>
        <input id="logFile" class="input" style="width:220px" placeholder="experiment_log.jsonl（可选）"/>
        <button class="btn" id="loadBtn" onclick="doLoad()">加载数据</button>
      </div>
    </div>
    <p id="statusMsg" style="font-size:12px;color:#93c5fd;margin-top:8px"> </p>
  </div>

  <div class="stats-row">
    <article class="stat card"><div class="k">Groups</div><div class="v" style="color:var(--blue)" id="statGroups">—</div></article>
    <article class="stat card"><div class="k">Samples</div><div class="v" id="statSamples">—</div></article>
    <article class="stat card"><div class="k">Steps</div><div class="v" id="statSteps">—</div></article>
    <article class="stat card"><div class="k">最新奖励</div><div class="v" style="color:var(--ok)" id="statRew">—</div></article>
    <article class="stat card"><div class="k">seg 占比</div><div class="v" style="color:var(--warn)" id="statSeg">—</div></article>
  </div>

  <div class="card chart-section" style="margin-bottom:12px">
    <div class="chart-header">
      <span style="font-size:13px;font-weight:600;color:#d1d5db">📈 奖励曲线</span>
      <div class="smooth-control">
        <span>Smooth</span>
        <input type="range" id="smoothSlider" min="0" max="98" value="60" oninput="onSmooth(this.value)"/>
        <span id="smoothVal" style="min-width:28px;text-align:right">0.60</span>
      </div>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
    <svg id="rewardChart" class="chart-svg" viewBox="0 0 820 180" style="width:100%;height:180px"></svg>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2 style="color:#d1d5db;font-size:14px;font-weight:600">按 Step 浏览 <span class="muted">— 点击进入详情</span></h2>
    <span id="stepCountLabel" class="muted"></span>
  </div>
  <div class="step-grid" id="stepGrid">
    <div class="card" style="padding:20px;text-align:center;color:var(--muted);grid-column:1/-1">
      加载数据后将显示步骤列表
    </div>
  </div>
</div>

<!-- ═══════ PAGE 2: DETAIL ═══════ -->
<div id="pg-detail" class="page">
  <div class="detail-header card">
    <button class="back-btn" onclick="showPage('pg-overview')">← 返回总览</button>
    <h2 style="margin:0" id="detailTitle">Step —</h2>
    <div id="detailBadges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    <div id="detailLoader" style="display:none"><span class="spin"></span> 加载中…</div>
  </div>
  <div class="detail-layout">
    <aside class="card group-sidebar">
      <h3>Groups <span class="muted" id="groupCount"></span></h3>
      <select class="input" style="width:100%" id="sidebarTask" onchange="filterGroups()">
        <option value="all">全部任务</option>
        <option>temporal_seg</option><option>add</option>
        <option>delete</option><option>replace</option><option>sort</option>
      </select>
      <div class="group-list" id="groupList">
        <div style="padding:14px;text-align:center;color:var(--muted);font-size:12px">暂无数据</div>
      </div>
    </aside>
    <div class="group-main" id="groupMain">
      <div class="card" style="padding:40px;text-align:center;color:var(--muted)">← 从左侧选择一条样本</div>
    </div>
  </div>
</div>
<!-- Frame zoom modal -->
<div class="frame-modal-overlay" id="frameModal" onclick="this.classList.remove('active')">
  <img id="frameModalImg" src="" alt="zoomed frame"/>
</div>

<script>
/* ═══════════════ CONSTANTS ═══════════════ */
const FW=104, FG=4, STRIDE=FW+FG, LABEL_W=68;
const TC={temporal_seg:'#fb7185',add:'#60a5fa',delete:'#34d399',replace:'#f59e0b',sort:'#a78bfa'};
const CLIP_COLORS=['#60a5fa','#34d399','#f59e0b','#a78bfa','#fb7185','#38bdf8','#e879f9','#fbbf24'];
const taskColor=t=>TC[t.replace(/_video|_text/,'')]||'#94a3b8';
const rewColor=r=>r>=.7?'#34d399':r>=.5?'#f59e0b':'#fb7185';

/* ═══════════════ STATE ═══════════════ */
let curSummary=null, curSteps=[], curStepGroups=[], curStep=null;
let chartData={}, hiddenCurves=new Set();

/* ═══════════════ API ═══════════════ */
const api={
  async load(rolloutDir,logFile){
    const q=new URLSearchParams({rollout_dir:rolloutDir});
    if(logFile) q.set('log_file',logFile);
    const r=await fetch('/api/load-data?'+q);
    return r.json();
  },
  async state(){return(await fetch('/api/state')).json()},
  async steps(){return(await fetch('/api/steps')).json()},
  async groups(step,task){
    const q=new URLSearchParams({limit:500});
    if(step!=null) q.set('step',step);
    if(task&&task!='all') q.set('task',task);
    return(await fetch('/api/groups?'+q)).json();
  },
  async group(uid,maxFrames=30){
    return(await fetch(`/api/group/${encodeURIComponent(uid)}?max_frames=${maxFrames}`)).json();
  },
};

/* ═══════════════ LOAD ═══════════════ */
async function doLoad(){
  const dir=document.getElementById('rolloutDir').value.trim();
  if(!dir){setStatus('请输入 rollout 目录路径',false);return;}
  const btn=document.getElementById('loadBtn');
  btn.disabled=true; btn.textContent='加载中…';
  try{
    const res=await api.load(dir,document.getElementById('logFile').value.trim()||null);
    if(res.ok){applyState(res.summary);}
    else setStatus('加载失败: '+(res.error||'unknown'),false);
  }catch(e){setStatus('网络错误: '+e.message,false);}
  btn.disabled=false; btn.textContent='加载数据';
}
function setStatus(msg,ok=true){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;el.style.color=ok?'#93c5fd':'#fb7185';
}

/* ═══════════════ SUMMARY ═══════════════ */
function applyState(summary){
  curSummary=summary;
  document.getElementById('statGroups').textContent=summary.group_count??'—';
  document.getElementById('statSamples').textContent=summary.sample_count??'—';
  document.getElementById('statSteps').textContent=summary.step_count??'—';
  const seg=(summary.temporal_ratio??0)*100;
  document.getElementById('statSeg').textContent=seg.toFixed(1)+'%';
  const curve=summary.step_curve||[];
  if(curve.length) document.getElementById('statRew').textContent=(curve[curve.length-1].reward??0).toFixed(3);

  // Build chart data: overall + per-task
  chartData={};
  if(curve.length) chartData['overall']=curve.map(p=>({step:p.step,v:p.reward}));
  const tc=summary.task_curves||{};
  Object.entries(tc).forEach(([t,pts])=>{chartData[t]=pts.map(p=>({step:p.step,v:p.reward}));});

  buildLegend();
  drawChart(+document.getElementById('smoothSlider').value/100);
  setStatus(`✓ 已加载: ${summary.group_count} groups / ${summary.sample_count} samples / ${summary.step_count} steps`);
  loadSteps();
}

/* ═══════════════ STEP GRID ═══════════════ */
async function loadSteps(){
  const res=await api.steps();
  if(!res.ok) return;
  curSteps=res.steps||[];
  document.getElementById('stepCountLabel').textContent=curSteps.length+' steps';
  buildStepGrid();
}
function buildStepGrid(){
  const grid=document.getElementById('stepGrid');
  grid.innerHTML='';
  if(!curSteps.length){
    grid.innerHTML='<div class="card" style="padding:20px;text-align:center;color:var(--muted);grid-column:1/-1">暂无步骤</div>';
    return;
  }
  curSteps.forEach(s=>{
    const el=document.createElement('div');
    el.className='card step-card';
    const rc=rewColor(s.mean_reward);
    const segs=Object.entries(s.task_counts||{}).map(([t,n])=>
      `<div style="flex:${n};height:100%;background:${taskColor(t)}"></div>`
    ).join('');
    const badges=Object.keys(s.task_counts||{}).map(t=>
      `<span class="badge" style="border-color:${taskColor(t)}66;font-size:10px">${t}</span>`
    ).join('');
    el.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:20px;font-weight:700;color:var(--blue)">Step ${s.step}</span>
        <span style="font-size:15px;font-weight:700;color:${rc}">${s.mean_reward.toFixed(3)}</span>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">${badges}</div>
      <div class="step-minibar">${segs}</div>
      <div class="muted" style="font-size:11px">${s.n_groups} groups</div>`;
    el.onclick=()=>enterStep(s.step,s.task_counts);
    grid.appendChild(el);
  });
}

/* ═══════════════ CHART ═══════════════ */
const CCOLORS={overall:'#e5e7eb',temporal_seg:'#fb7185',add:'#60a5fa',
  'delete':'#34d399',replace:'#f59e0b',sort:'#a78bfa'};
function ema(data,a){
  if(a<.01)return[...data];
  let s=[data[0]];
  for(let i=1;i<data.length;i++) s.push(a*s[i-1]+(1-a)*data[i]);
  return s;
}
function drawChart(a=.6){
  const svg=document.getElementById('rewardChart');
  const W=820,H=180,PL=38,PR=10,PT=12,PB=28;
  const pw=W-PL-PR, ph=H-PT-PB;
  if(!Object.keys(chartData).length){svg.innerHTML='';return;}
  const allSteps=[...new Set(Object.values(chartData).flatMap(pts=>pts.map(p=>p.step)))].sort((a,b)=>a-b);
  if(!allSteps.length) return;
  const minS=allSteps[0], maxS=allSteps[allSteps.length-1];
  const xs=s=>PL+((s-minS)/Math.max(1,maxS-minS))*pw;
  const ys=v=>PT+(1-Math.max(0,Math.min(1,v)))*ph;
  let d='';
  [0,.25,.5,.75,1].forEach(v=>{
    const y=ys(v);
    d+=`<line x1="${PL}" y1="${y}" x2="${PL+pw}" y2="${y}" stroke="rgba(148,163,184,.08)" stroke-width="1"/>`;
    d+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#6b7280">${v.toFixed(2)}</text>`;
  });
  [minS,...allSteps.filter((_,i,arr)=>i==0||i==arr.length-1||(i%Math.max(1,Math.floor(arr.length/5))===0))].filter((v,i,a)=>a.indexOf(v)===i).forEach(s=>{
    const x=xs(s);
    d+=`<text x="${x}" y="${H-8}" text-anchor="middle" font-size="9" fill="#6b7280">${s}</text>`;
    d+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${H-PB}" stroke="rgba(148,163,184,.05)" stroke-width="1"/>`;
  });
  d+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="rgba(148,163,184,.25)" stroke-width="1"/>`;
  d+=`<line x1="${PL}" y1="${H-PB}" x2="${PL+pw}" y2="${H-PB}" stroke="rgba(148,163,184,.25)" stroke-width="1"/>`;
  Object.entries(chartData).forEach(([name,pts])=>{
    if(hiddenCurves.has(name)) return;
    const color=CCOLORS[name]||taskColor(name);
    const vs=pts.map(p=>p.v);
    const sm=ema(vs,a);
    const path=pts.map((p,i)=>`${xs(p.step)},${ys(sm[i])}`).join(' ');
    const isAll=name==='overall';
    d+=`<polyline points="${path}" fill="none" stroke="${color}" stroke-width="${isAll?2.5:1.5}" stroke-opacity="${isAll?.92:.7}"/>`;
  });
  svg.innerHTML=d;
}
function buildLegend(){
  const el=document.getElementById('chartLegend');
  el.innerHTML=Object.keys(chartData).map(n=>{
    const c=CCOLORS[n]||taskColor(n);
    return `<div class="legend-item" id="leg-${n}" onclick="toggleCurve('${n}')">
      <div class="legend-dot" style="background:${c}"></div>
      <span style="color:${c}">${n}</span></div>`;
  }).join('');
}
function toggleCurve(n){
  hiddenCurves.has(n)?hiddenCurves.delete(n):hiddenCurves.add(n);
  const el=document.getElementById('leg-'+n);
  if(el) el.style.opacity=hiddenCurves.has(n)?.3:1;
  drawChart(+document.getElementById('smoothSlider').value/100);
}
function onSmooth(v){
  document.getElementById('smoothVal').textContent=(v/100).toFixed(2);
  drawChart(v/100);
}

/* ═══════════════ STEP DETAIL ═══════════════ */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function enterStep(step,taskCounts){
  curStep=step;
  showPage('pg-detail');
  document.getElementById('detailTitle').textContent='Step '+step;
  document.getElementById('detailBadges').innerHTML=
    Object.entries(taskCounts||{}).map(([t,n])=>
      `<span class="badge" style="border-color:${taskColor(t)}66">${t} ×${n}</span>`
    ).join('');
  loadGroups();
}
async function loadGroups(){
  const task=document.getElementById('sidebarTask').value;

  // Try preloaded data first (works even when API proxy blocks requests)
  const pre=window.__PRELOADED__;
  if(pre&&pre.all_groups){
    let gs=pre.all_groups;
    if(curStep!=null) gs=gs.filter(g=>g.step==curStep);
    if(task&&task!='all') gs=gs.filter(g=>g.problem_type==task);
    curStepGroups=gs;
    renderGroupList(curStepGroups);
    if(curStepGroups.length) selectGroup(curStepGroups[0].uid);
    return;
  }

  // Fallback: API call
  try{
    const res=await api.groups(curStep,task);
    if(!res.ok){document.getElementById('groupList').innerHTML='<div style="padding:12px;color:var(--danger);font-size:12px">加载失败</div>';return;}
    curStepGroups=res.groups||[];
    renderGroupList(curStepGroups);
    if(curStepGroups.length) selectGroup(curStepGroups[0].uid);
  }catch(e){
    document.getElementById('groupList').innerHTML='<div style="padding:12px;color:var(--danger);font-size:12px">加载失败: '+e.message+'</div>';
  }
}
function filterGroups(){loadGroups();}
function renderGroupList(gs){
  document.getElementById('groupCount').textContent='('+gs.length+')';
  const list=document.getElementById('groupList');
  list.innerHTML='';
  if(!gs.length){
    list.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted);font-size:12px">无匹配记录</div>';
    return;
  }
  gs.forEach(g=>{
    const el=document.createElement('div');
    el.className='group-row'; el.id='gr-'+g.uid;
    const rc=rewColor(g.mean_reward);
    el.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px">
        <span class="badge" style="border-color:${taskColor(g.problem_type)}66">${g.problem_type}</span>
        <span style="font-weight:700;color:${rc}">${g.mean_reward.toFixed(3)}</span>
      </div>
      <div style="font-family:monospace;font-size:10px;color:var(--muted)">${g.uid}…</div>`;
    el.onclick=()=>selectGroup(g.uid);
    list.appendChild(el);
  });
}
function selectGroup(uid){
  document.querySelectorAll('.group-row').forEach(e=>e.classList.remove('active'));
  const r=document.getElementById('gr-'+uid);
  if(r){r.classList.add('active');r.scrollIntoView({block:'nearest'});}
  renderGroup(uid);
}

/* ═══════════════ GROUP DETAIL ═══════════════ */
async function renderGroup(uid){
  const main=document.getElementById('groupMain');
  main.innerHTML='<div class="card" style="padding:20px;text-align:center"><span class="spin"></span> 加载中…</div>';

  let g;
  // Try preloaded data first
  const pre=window.__PRELOADED__;
  if(pre&&pre.all_details&&pre.all_details[uid]){
    g=pre.all_details[uid];
  } else {
    // Fallback: API call
    try{
      const res=await api.group(uid,30);
      if(!res.ok){main.innerHTML='<div class="card" style="padding:20px;color:var(--danger)">'+(res.error||'加载失败')+'</div>';return;}
      g=res.group;
    }catch(e){
      main.innerHTML='<div class="card" style="padding:20px;color:var(--danger)">加载失败: '+e.message+'</div>';return;
    }
  }
  const frames=g.frame_strip||[];
  const clipBounds=g.clip_boundaries||[];
  const nF=frames.length;
  const maxT=Number(g.timeline_max_t)||nF||60;
  const innerW=Math.max(nF,1)*STRIDE+16;
  const task=g.problem_type||'';
  const nClips=clipBounds.length||1;

  // Build frame HTML
  const modSeg=g.modification_seg||null;
  // Store frames globally for zoom access
  window._currentFrames=frames;
  function makeFrameItem(src,idx){
    const ts=nF>1?Math.round(idx*maxT/(nF-1)):0;
    const inM=modSeg&&ts>=modSeg.start&&ts<=modSeg.end;
    const ci=getClipIndex(idx,clipBounds);
    const clipColor=CLIP_COLORS[ci%CLIP_COLORS.length];
    const borderStyle=nClips>1?`border-color:${clipColor}`:'';
    const imgHTML=src?`<img src="${src}" alt="${ts}s"/>`:`<span>${ts}s</span>`;
    const clipBadge=nClips>1?`<span class="frame-clip-badge" style="background:${clipColor}">C${ci+1}</span>`:'';
    return `<div class="frame-item" onclick="zoomFrame(${idx})">
      <div class="frame-img${inM?' mod':''}" style="${borderStyle}">
        ${imgHTML}${inM?'<span class="frame-mod-badge">mod</span>':''}${clipBadge}
      </div>
      <div class="frame-label">${ts}s</div>
    </div>`;
  }
  const framesHTML=(nF>0?frames:['']).map((s,i)=>makeFrameItem(s,i)).join('');

  // Meta bar
  let html=`
    <div class="card" style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span class="badge" style="border-color:${taskColor(task)}66">${task}</span>
      <span class="badge">step ${g.step}</span>
      <span class="badge">uid ${g.uid}</span>
      <span class="badge">n=${(g.attempts||[]).length}</span>
      <span class="badge" style="border-color:${rewColor(g.mean_reward).replace('#','rgba(').replace('fb7185','251,113,133,.5)').replace('34d399','52,211,153,.5)').replace('f59e0b','245,158,11,.5)')}">
        μ reward ${Number(g.mean_reward).toFixed(3)}
      </span>
    </div>`;

  if(task==='temporal_seg'){
    /* ── Temporal seg: synchronized frame + timeline ── */
    const attempts=g.attempts||[];
    const toLeft=t=>((t/maxT)*innerW).toFixed(1)+'px';
    const toWidth=(s,e)=>(((e-s)/maxT)*innerW).toFixed(1)+'px';
    const numTicks=8;
    let ruler='';
    for(let i=0;i<=numTicks;i++){
      const t=Math.round(i/numTicks*maxT);
      const px=(i/numTicks*innerW).toFixed(1);
      ruler+=`<span class="tl-tick" style="left:${px}px">${t}s</span>`;
    }
    // GT segments (use first attempt that has ground_truth segs)
    let gtSegsHTML='';
    for(const att of attempts){
      const gts=(att.temporal_segments||{}).ground_truth||[];
      if(gts.length){
        gtSegsHTML=gts.map(([s,e])=>
          `<div class="seg-blk" style="left:${toLeft(s)};width:${toWidth(s,e)};background:#f87171"></div>`
        ).join('');
        break;
      }
    }
    // Per-attempt pred lanes
    const predLanes=attempts.map((r,ri)=>{
      const rc=rewColor(r.reward);
      const segs=(r.temporal_segments||{}).predicted||[];
      const segHTML=segs.map(([s,e])=>
        `<div class="seg-blk" style="left:${toLeft(s)};width:${toWidth(s,e)};background:${rc}"></div>`
      ).join('');
      return `<div class="tl-lane" style="margin-bottom:3px">${segHTML}</div>`;
    }).join('');

    const labelItems=[
      `<div style="height:${nF>0?74:20}px"></div>`,  // spacer for frame strip
      `<div style="height:26px"></div>`,               // spacer for ruler
      `<div class="tl-label-item" style="height:22px;color:#f87171">
         <div class="tl-dot" style="background:#f87171"></div>GT
       </div>`,
      `<div style="height:7px"></div>`,
      ...attempts.map((r,ri)=>{
        const rc=rewColor(r.reward);
        return `<div class="tl-label-item" style="height:21px;color:${rc}">
          <div class="tl-dot" style="background:${rc}"></div>
          R${ri+1}&nbsp;<span style="font-size:9px">${r.reward.toFixed(2)}</span>
        </div>`;
      }),
    ].join('');

    html+=`
      <div class="card" style="padding:14px">
        <h3 style="margin-bottom:10px">
          📽 帧条 + ⏱ 时间轴
          <span class="muted">（同步滚动 · ${maxT}s · ${nF} 帧）</span>
        </h3>
        <div style="display:flex;gap:0;align-items:flex-start">
          <div style="width:${LABEL_W}px;flex-shrink:0;display:flex;flex-direction:column">${labelItems}</div>
          <div style="flex:1;overflow:hidden" id="so-${uid}">
            <div style="width:${innerW}px">
              <div style="display:flex;gap:${FG}px;padding:10px 8px">${framesHTML}</div>
              <div style="position:relative;height:18px;margin:4px 0 6px">${ruler}</div>
              <div class="tl-lane" style="margin-bottom:7px">${gtSegsHTML}</div>
              <div style="height:1px;background:rgba(148,163,184,.12);margin-bottom:3px"></div>
              ${predLanes}
            </div>
          </div>
        </div>
        <div style="padding:6px 0 2px ${LABEL_W}px;display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--muted)">0s</span>
          <input type="range" class="sync-slider" min="0" max="100" value="0"
            style="flex:1;accent-color:#34d399"
            oninput="syncScroll('${uid}',this.value)"/>
          <span style="font-size:10px;color:var(--muted)">${maxT}s</span>
        </div>
      </div>`;

    // GT text
    const gtText=(attempts[0]||{}).response||g.ground_truth||'';
    if(gtText) html+=`
      <div class="card" style="padding:12px 14px">
        <h3 style="margin-bottom:8px">📄 Ground Truth</h3>
        <pre class="mono">${esc(String(g.ground_truth||'').slice(0,600))}</pre>
      </div>`;

    // Rollout responses
    html+=`<div class="card" style="padding:14px"><h3 style="margin-bottom:8px">🔄 Rollout 详情</h3>`;
    attempts.forEach((r,ri)=>{
      const rc=rewColor(r.reward);
      html+=`<div style="padding:8px 0;border-bottom:1px solid rgba(148,163,184,.1);display:grid;gap:4px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="badge">Rollout #${ri+1}</span>
          <span style="color:${rc};font-weight:700">${r.reward.toFixed(3)}</span>
        </div>
        <pre class="mono" style="max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word">${esc(String(r.response||''))}</pre>
      </div>`;
    });
    html+='</div>';

  } else {
    /* ── Non-seg tasks: standalone frame strip ── */
    let modBand='';
    if(modSeg){
      const p1=((modSeg.start/maxT)*100).toFixed(1);
      const pw2=(((modSeg.end-modSeg.start)/maxT)*100).toFixed(1);
      modBand=`<div class="mod-band">
        <span style="color:#fbbf24;font-weight:700">✂ 修改区域</span>
        <span style="color:#fbbf24">${modSeg.start}s – ${modSeg.end}s</span>
        <span style="color:var(--muted)">${modSeg.description||''}</span>
        <div class="mod-timeline">
          <div class="mod-timeline-seg" style="left:${p1}%;width:${pw2}%"></div>
        </div>
      </div>`;
    }
    const clipLegend=nClips>1?clipBounds.map((b,i)=>
      `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;margin-left:6px"><span style="width:8px;height:8px;border-radius:50%;background:${CLIP_COLORS[i%CLIP_COLORS.length]}"></span>Clip ${i+1}</span>`
    ).join(''):'';
    html+=`
      <div class="card" style="padding:14px">
        <h3 style="margin-bottom:10px">📽 输入帧条 <span class="muted">（${nClips} clip${nClips>1?'s':''}, ${nF} 帧 · 点击帧可放大）</span>${clipLegend}</h3>
        <div style="border-radius:8px;border:1px solid rgba(148,163,184,.18);background:rgba(2,6,23,.35)">
          <div id="ft-${uid}" style="display:flex;gap:${FG}px;padding:10px 8px;overflow-x:auto;scrollbar-width:thin;-webkit-overflow-scrolling:touch">${framesHTML}</div>
        </div>
        ${modBand}
        <div style="padding:4px 0 2px;display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--muted)">0s</span>
          <input type="range" style="flex:1;accent-color:#34d399" min="0" max="${Math.max(1,nF-1)}" value="0"
            oninput="scrollFT('${uid}',this.value,${nF})"/>
          <span style="font-size:10px;color:var(--muted)">${maxT}s</span>
        </div>
      </div>`;

    if(task==='sort') html+=renderSort(g);
    else              html+=renderChoice(g);
  }

  main.innerHTML=html;
}

/* ═══════════════ SCROLL ═══════════════ */
function syncScroll(uid,val){
  const o=document.getElementById('so-'+uid);
  if(!o) return;
  o.scrollLeft=(val/100)*(o.scrollWidth-o.clientWidth);
}
function scrollFT(uid,val,n){
  const t=document.getElementById('ft-'+uid);
  if(!t) return;
  t.scrollLeft=(val/Math.max(1,n-1))*(t.scrollWidth-t.clientWidth);
}

/* ═══════════════ SORT ═══════════════ */
function renderSort(g){
  const sm=g.sort_meta||{};
  const gt=sm.gt_order||[];
  const attempts=g.attempts||[];
  const frames=g.frame_strip||[];
  const panels=attempts.map((r,ri)=>{
    const rc=rewColor(r.reward);
    const pred=r.pred_order||[];
    const cards=pred.map((id,pi)=>{
      const gi=gt.indexOf(id);
      const d=Math.abs(pi-gi);
      const cls=d===0?'s-ok':d===1?'s-d1':'s-d2';
      const dl=d===0?'✓0':pi>gi?`+${pi-gi}`:`${pi-gi}`;
      // show clip frame if available (clips are not indexed, just show position)
      return `
        <div class="sort-clip ${cls}">
          <div class="sort-clip-img"><span>clip ${id}</span></div>
          <div class="sort-clip-meta">
            <span style="font-size:10px;font-weight:700;color:var(--muted)">#${pi+1}→GT#${gi+1}</span>
            <span class="sort-clip-delta">Δ${dl}</span>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="sort-rollout-panel">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <span class="badge">Rollout #${ri+1}</span>
          <span style="color:${rc};font-weight:700;font-size:13px">${r.reward.toFixed(3)}</span>
          <span class="chip">Pred: ${pred.join('')}</span>
          <span class="chip">GT: ${gt.join('')}</span>
        </div>
        <div class="sort-grid">${cards||'<div class="muted" style="font-size:11px;padding:4px">未能解析预测顺序</div>'}</div>
        <pre class="mono" style="max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word">${esc(String(r.response||''))}</pre>
      </div>`;
  }).join('');
  return `
    <div class="card" style="padding:14px">
      <h3 style="margin-bottom:10px">🃏 Sort 可视化
        <span class="muted">— 每条 rollout 按预测顺序，边框 = 偏移量</span>
      </h3>
      <div style="display:flex;gap:12px;margin-bottom:10px;font-size:11px">
        <span><i style="display:inline-block;width:10px;height:10px;border:2px solid #34d399;border-radius:2px;margin-right:4px;vertical-align:middle"></i>Δ0</span>
        <span><i style="display:inline-block;width:10px;height:10px;border:2px solid #f59e0b;border-radius:2px;margin-right:4px;vertical-align:middle"></i>Δ1</span>
        <span><i style="display:inline-block;width:10px;height:10px;border:2px solid #fb7185;border-radius:2px;margin-right:4px;vertical-align:middle"></i>Δ≥2</span>
      </div>
      ${panels||'<div class="muted" style="font-size:12px">暂无 rollout 数据</div>'}
    </div>`;
}

/* ═══════════════ CHOICE ═══════════════ */
function renderChoice(g){
  const cm=g.choice_meta||{};
  const gtLetter=cm.gt_letter||'';
  const isVid=cm.option_type==='video';
  const attempts=g.attempts||[];
  const prompt=String(g.prompt||'');

  // Parse text options from prompt A. B. C. D.
  const optPat=/\b([A-D])\.\s+(.+?)(?=\n[A-D]\.|$)/gs;
  const parsedOpts=[];
  let m;
  while((m=optPat.exec(prompt))!==null) parsedOpts.push({letter:m[1],text:m[2].trim()});

  let optHTML='';
  if(parsedOpts.length>=2){
    const cards=parsedOpts.map(o=>{
      const cls=o.letter===gtLetter&&attempts[0]?.pred_letter===o.letter?'c-both':
                o.letter===gtLetter?'c-gt':
                o.letter===(attempts[0]?.pred_letter||'')?'c-pred':'';
      const tag=cls==='c-both'?'✓ GT=Pred':cls==='c-gt'?'✓ GT':cls==='c-pred'?'← Pred':'';
      return `
        <div class="choice-text-card ${cls}">
          <div style="display:flex;gap:8px;align-items:center;font-size:12px">
            <b style="font-size:15px">${o.letter}.</b>
            ${tag?`<span class="chip">${tag}</span>`:''}
          </div>
          <div style="font-size:12px;line-height:1.5;color:#cbd5e1">${esc(o.text)}</div>
        </div>`;
    }).join('');
    optHTML=`<div class="choice-text-grid">${cards}</div>`;
  } else {
    optHTML=`<div class="muted" style="font-size:12px;padding:4px">
      GT: <b style="color:var(--ok)">${gtLetter||'—'}</b>
      <br/>选项无法从 prompt 自动解析，请在 rollout 数据中添加 options_list 字段
    </div>`;
  }

  const rolloutItems=attempts.map((r,i)=>{
    const rc=rewColor(r.reward);
    return `
      <div style="padding:8px 0;border-bottom:1px solid rgba(148,163,184,.1);display:grid;gap:4px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="badge">Rollout #${i+1}</span>
          <span style="color:${rc};font-weight:700;font-size:13px">${r.reward.toFixed(3)}</span>
          <span class="chip">Pred: ${r.pred_letter||'?'}</span>
          <span class="chip">GT: ${gtLetter||'?'}</span>
        </div>
        <pre class="mono" style="max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word">${esc(String(r.response||''))}</pre>
      </div>`;
  }).join('');
  const typeLabel=isVid?'选项为视频片段':'选项为文本';
  return `
    <div class="card" style="padding:14px">
      <h3 style="margin-bottom:8px">🎯 选项 <span class="muted">（${typeLabel}）</span></h3>
      ${optHTML}
    </div>
    <div class="card" style="padding:14px">
      <h3 style="margin-bottom:8px">🔄 Rollout 详情</h3>
      ${rolloutItems}
    </div>`;
}

/* ═══════════════ UTILS ═══════════════ */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function zoomFrame(idx){
  const frames=window._currentFrames||[];
  const src=frames[idx];
  if(!src) return;
  const modal=document.getElementById('frameModal');
  document.getElementById('frameModalImg').src=src;
  modal.classList.add('active');
}
function getClipIndex(idx, boundaries){
  if(!boundaries||!boundaries.length) return 0;
  let ci=0;
  for(let i=1;i<boundaries.length;i++){
    if(idx>=boundaries[i]) ci=i; else break;
  }
  return ci;
}

/* ═══════════════ INIT ═══════════════ */
(async()=>{
  // Use server-injected pre-loaded data if available (no API call needed)
  const pre=window.__PRELOADED__;
  if(pre&&pre.summary&&pre.summary.group_count>0){
    if(pre.summary.rollout_dir) document.getElementById('rolloutDir').value=pre.summary.rollout_dir;
    applyStateWithSteps(pre.summary, pre.steps||[]);
    return;
  }

  // Fallback: try API calls
  try{
    const res=await api.state();
    if(res.ok&&res.summary&&res.summary.group_count>0){
      if(res.summary.rollout_dir) document.getElementById('rolloutDir').value=res.summary.rollout_dir;
      applyState(res.summary);
    }
  }catch(e){}
})();

function applyStateWithSteps(summary, steps){
  curSummary=summary;
  document.getElementById('statGroups').textContent=summary.group_count??'—';
  document.getElementById('statSamples').textContent=summary.sample_count??'—';
  document.getElementById('statSteps').textContent=summary.step_count??'—';
  const seg=(summary.temporal_ratio??0)*100;
  document.getElementById('statSeg').textContent=seg.toFixed(1)+'%';
  const curve=summary.step_curve||[];
  if(curve.length) document.getElementById('statRew').textContent=(curve[curve.length-1].reward??0).toFixed(3);
  chartData={};
  if(curve.length) chartData['overall']=curve.map(p=>({step:p.step,v:p.reward}));
  const tc=summary.task_curves||{};
  Object.entries(tc).forEach(([t,pts])=>{chartData[t]=pts.map(p=>({step:p.step,v:p.reward}));});
  buildLegend();
  drawChart(+document.getElementById('smoothSlider').value/100);
  setStatus(`✓ 已加载: ${summary.group_count} groups / ${summary.sample_count} samples / ${summary.step_count} steps`);
  curSteps=steps;
  document.getElementById('stepCountLabel').textContent=curSteps.length+' steps';
  buildStepGrid();
}
</script>
</body>
</html>
